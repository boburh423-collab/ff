<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Special Force 2</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:none;user-select:none;-webkit-user-select:none}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Arial',sans-serif}
#gc{position:fixed;top:0;left:0;z-index:0;image-rendering:auto}
.scr{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;background:linear-gradient(180deg,#050810 0%,#0a0e1a 100%);padding:10px;gap:7px;z-index:20;overflow-y:auto;-webkit-overflow-scrolling:touch}
.scr.off{display:none!important}
.gtitle{font-size:22px;font-weight:900;letter-spacing:2px;color:#ff6600;text-shadow:0 0 20px #ff660088,0 2px 0 #000;flex-shrink:0;margin-top:4px}
.gsubt{font-size:11px;color:#445;text-align:center;flex-shrink:0;letter-spacing:1px}
.card{background:rgba(10,14,26,.95);border:1px solid #1a2235;border-radius:12px;padding:14px;width:100%;max-width:380px;display:flex;flex-direction:column;gap:8px;flex-shrink:0;box-shadow:0 4px 20px rgba(0,0,0,.5)}
.lbl{font-size:10px;color:#334;text-transform:uppercase;letter-spacing:.08em}
.inp{background:#06080f;border:1px solid #1a2235;border-radius:8px;padding:11px 13px;color:#ccd;font-size:14px;outline:none;width:100%;-webkit-appearance:none;transition:.2s}
.inp:focus{border-color:#ff6600;box-shadow:0 0 0 2px rgba(255,102,0,.15)}
.btn{border:none;border-radius:8px;padding:13px;font-size:13px;font-weight:700;cursor:pointer;width:100%;letter-spacing:.5px;transition:.15s}
.btn:active{transform:scale(.97)}
.btn-red{background:linear-gradient(135deg,#cc3300,#881100);color:#fff;box-shadow:0 2px 12px rgba(200,50,0,.4)}
.btn-blue{background:linear-gradient(135deg,#1155cc,#003388);color:#fff;box-shadow:0 2px 12px rgba(17,85,204,.4)}
.btn-gray{background:#0d1120;border:1px solid #1a2235;color:#667}
.btn-green{background:linear-gradient(135deg,#116633,#0a3d1f);color:#fff;box-shadow:0 2px 12px rgba(17,102,51,.4)}
.cc-row{display:flex;gap:7px;flex-wrap:wrap}
.cc{width:28px;height:28px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:.15s}
.cc.sel{border-color:#fff;transform:scale(1.2);box-shadow:0 0 8px rgba(255,255,255,.4)}
.map-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;width:100%;max-width:380px}
.map-card{background:rgba(8,12,22,.95);border:1.5px solid #1a2235;border-radius:10px;padding:10px 8px;cursor:pointer;transition:.2s;text-align:center}
.map-card.sel{border-color:#ff6600;background:rgba(30,15,5,.95);box-shadow:0 0 12px rgba(255,102,0,.25)}
.map-ico{font-size:24px;display:block;margin-bottom:3px}
.map-name{font-size:11px;font-weight:700;color:#aab;letter-spacing:.5px}
.map-desc{font-size:9px;color:#445;margin-top:1px}
.plist{display:flex;flex-direction:column;gap:5px;width:100%;max-width:380px;max-height:150px;overflow-y:auto}
.prow{background:rgba(8,12,22,.95);border:1px solid #1a2235;border-radius:8px;padding:8px 12px;display:flex;align-items:center;gap:8px;font-size:12px;color:#aab}
.pdot{width:9px;height:9px;border-radius:50%;flex-shrink:0}

/* ── HUD ─────────────────────────────────── */
#hud{position:fixed;inset:0;z-index:5;pointer-events:none}

/* HP bar */
.hp-wrap{position:absolute;bottom:100px;left:10px;display:flex;flex-direction:column;gap:3px}
.hp-icon{font-size:16px;color:#ff3333;text-shadow:0 0 8px #ff333399}
.hp-bar-outer{width:120px;height:10px;background:rgba(0,0,0,.6);border-radius:5px;border:1px solid rgba(255,255,255,.1);overflow:hidden}
.hp-fill{height:100%;border-radius:5px;transition:.3s}
.hp-txt{font-size:11px;font-weight:900;color:#fff;text-shadow:1px 1px 3px #000;letter-spacing:.5px}

/* Ammo */
.ammo-wrap{position:absolute;bottom:100px;right:10px;text-align:right}
.ammo-big{font-size:26px;font-weight:900;color:#fff;text-shadow:0 2px 6px #000,0 0 12px rgba(255,150,50,.3);line-height:1;font-family:monospace}
.ammo-reserve{font-size:11px;color:#778;font-family:monospace;margin-top:2px}
.weapon-name{font-size:11px;color:#ff9944;font-weight:700;letter-spacing:1px;text-shadow:0 0 8px rgba(255,150,50,.5)}

/* Kills */
.kills-wrap{position:absolute;top:8px;right:10px;display:flex;flex-direction:column;align-items:flex-end;gap:2px}
.kills-num{font-size:18px;font-weight:900;color:#ffd700;text-shadow:0 0 10px rgba(255,215,0,.5),0 2px 4px #000;font-family:monospace}
.kills-lbl{font-size:9px;color:#665;text-transform:uppercase;letter-spacing:1px}

/* Crosshair */
.xhair{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}

/* Minimap */
.minimap{position:absolute;top:8px;left:8px;border-radius:6px;overflow:hidden;border:1px solid rgba(255,255,255,.08);box-shadow:0 2px 8px rgba(0,0,0,.5)}

/* Kill feed */
.kf-list{position:absolute;top:38px;right:10px;display:flex;flex-direction:column;gap:3px;align-items:flex-end}
.kf{background:rgba(0,0,0,.7);border-left:3px solid #ff4400;border-radius:0 5px 5px 0;padding:3px 8px;font-size:11px;color:#eee;animation:kfslide .25s ease;max-width:210px;text-align:right;backdrop-filter:blur(4px)}
@keyframes kfslide{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:none}}

/* Hit flash */
.hit-flash{position:fixed;inset:0;pointer-events:none;opacity:0;z-index:8;transition:opacity .08s}
.hit-vignette{position:fixed;inset:0;pointer-events:none;z-index:7;background:radial-gradient(ellipse at center,transparent 40%,rgba(200,0,0,0) 70%);opacity:0;transition:opacity .5s}

/* Scope overlay */
.scope-wrap{position:fixed;inset:0;z-index:7;pointer-events:none;display:none}

/* Weapon bar */
#wbar{position:absolute;bottom:4px;left:0;right:0;display:flex;justify-content:center;gap:4px;padding:0 130px 0 95px;flex-wrap:nowrap;overflow-x:auto;pointer-events:all}
#wbar::-webkit-scrollbar{display:none}
.wslot{background:rgba(0,0,0,.7);border:1.5px solid rgba(255,255,255,.08);border-radius:7px;padding:4px 8px;font-size:9px;color:#556;cursor:pointer;white-space:nowrap;flex-shrink:0;text-align:center;transition:.15s;backdrop-filter:blur(4px)}
.wslot.on{border-color:#ff6600;color:#ff9944;background:rgba(255,102,0,.15);box-shadow:0 0 8px rgba(255,102,0,.3)}
.wslot .wi{font-size:13px;display:block;margin-bottom:1px}

/* Damage number */
.dmg{position:absolute;font-size:15px;font-weight:900;text-shadow:0 1px 4px #000;animation:dmgfly .7s ease forwards;pointer-events:none;font-family:monospace}
@keyframes dmgfly{0%{opacity:1;transform:translateY(0) scale(1.2)}100%{opacity:0;transform:translateY(-40px) scale(.8)}}

/* Name tag */
.ntag{position:absolute;background:rgba(0,0,0,.7);border-radius:3px;padding:2px 5px;font-size:9px;font-weight:700;white-space:nowrap;pointer-events:none;transform:translate(-50%,-100%);backdrop-filter:blur(2px)}

/* Round indicator */
.round-info{position:absolute;top:8px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.7);border-radius:20px;padding:4px 14px;font-size:11px;font-weight:700;color:#ccd;letter-spacing:.5px;border:1px solid rgba(255,255,255,.06);backdrop-filter:blur(4px)}

/* Dead screen */
#sDead{background:radial-gradient(ellipse at center,#1a0000 0%,#000 100%)}
.d-title{font-size:40px;font-weight:900;color:#ff2222;text-shadow:0 0 30px #ff0000,0 0 60px #ff000055;letter-spacing:2px;animation:dtpulse 1s ease infinite alternate}
@keyframes dtpulse{from{opacity:.8}to{opacity:1}}
.d-killer{font-size:14px;color:#555;margin:6px 0}
.d-cnt{font-size:52px;font-weight:900;color:#fff;text-shadow:0 0 20px rgba(255,255,255,.3);font-family:monospace;margin:8px 0 4px}
.d-sub{font-size:11px;color:#333;letter-spacing:.5px}

/* Score board */
.sb-wrap{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:25;display:none;flex-direction:column;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(10px)}
.sb-title{font-size:18px;font-weight:900;color:#ffd700;letter-spacing:2px;margin-bottom:14px;text-shadow:0 0 15px rgba(255,215,0,.4)}
.sb-row{display:flex;gap:10px;align-items:center;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:8px;padding:8px 14px;margin-bottom:5px;min-width:270px}
.sb-rank{font-size:18px;width:28px}
.sb-name{flex:1;font-size:12px;font-weight:700;color:#ccd}
.sb-k{color:#ffd700;font-size:13px;font-weight:900;font-family:monospace}
.sb-d{color:#ff4444;font-size:11px;font-family:monospace;margin-left:6px}

/* Toast */
.toast-msg{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.9);color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:700;z-index:30;display:none;text-align:center;max-width:82%;border:1px solid rgba(255,255,255,.1);backdrop-filter:blur(8px)}

/* CONTROLS */
#ctrl{position:fixed;bottom:0;left:0;right:0;height:130px;z-index:6;display:none}
.stick-z{position:absolute;bottom:10px;left:10px;width:115px;height:115px}
.stick-base{position:absolute;inset:0;border-radius:50%;background:rgba(255,255,255,.04);border:2px solid rgba(255,255,255,.1)}
.stick-knob{position:absolute;width:40px;height:40px;border-radius:50%;background:radial-gradient(circle at 35% 35%,rgba(255,255,255,.35),rgba(255,255,255,.12));border:2px solid rgba(255,255,255,.25);transform:translate(-50%,-50%);left:50%;top:50%;box-shadow:0 2px 8px rgba(0,0,0,.4)}
.look-z{position:absolute;bottom:10px;right:130px;left:130px;height:115px}
.fire-z{position:absolute;bottom:14px;right:12px;width:78px;height:78px;border-radius:50%;background:radial-gradient(circle at 35% 35%,rgba(255,80,50,.45),rgba(200,30,10,.3));border:3px solid rgba(255,100,60,.5);display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;box-shadow:0 0 16px rgba(255,50,0,.3),inset 0 1px 0 rgba(255,255,255,.1)}
.fire-z:active{background:radial-gradient(circle at 35% 35%,rgba(255,100,80,.7),rgba(220,60,30,.5))}
.reload-z{position:absolute;bottom:78px;right:14px;width:40px;height:40px;border-radius:50%;background:rgba(80,80,255,.2);border:1.5px solid rgba(120,120,255,.35);display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer}
.zoom-z{position:absolute;bottom:78px;right:58px;width:36px;height:36px;border-radius:50%;background:rgba(255,200,50,.12);border:1.5px solid rgba(255,200,50,.28);display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer}
</style>
</head>
<body>
<canvas id="gc"></canvas>

<!-- SETUP -->
<div class="scr" id="sSetup">
  <div class="gtitle">⚔ SPECIAL FORCE 2</div>
  <div class="gsubt">CS2 STYLE • LAN MULTIPLAYER</div>
  <div class="card">
    <div class="lbl">Ismingiz</div>
    <input class="inp" id="iName" placeholder="Player1" maxlength="14">
    <div class="lbl">Jamoangiz rangi</div>
    <div class="cc-row">
      <div class="cc sel" style="background:#ff4444" data-c="#ff4444" onclick="selColor(this)"></div>
      <div class="cc" style="background:#4488ff" data-c="#4488ff" onclick="selColor(this)"></div>
      <div class="cc" style="background:#44dd88" data-c="#44dd88" onclick="selColor(this)"></div>
      <div class="cc" style="background:#ffcc22" data-c="#ffcc22" onclick="selColor(this)"></div>
      <div class="cc" style="background:#ff44cc" data-c="#ff44cc" onclick="selColor(this)"></div>
      <div class="cc" style="background:#22ddff" data-c="#22ddff" onclick="selColor(this)"></div>
      <div class="cc" style="background:#ff8822" data-c="#ff8822" onclick="selColor(this)"></div>
      <div class="cc" style="background:#ccff44" data-c="#ccff44" onclick="selColor(this)"></div>
    </div>

<!-- MAP SELECT -->
<div class="scr off" id="sMap">
  <div class="gtitle">🗺 XARITA</div>
  <div class="gsubt">MAYDON TANLANG</div>
  <div class="map-grid" id="mapGrid"></div>
  <div style="max-width:380px;width:100%;display:flex;flex-direction:column;gap:7px;margin-top:8px">
    <button class="btn btn-green" onclick="confirmMap()">✅ Tasdiqlash</button>
    <button class="btn btn-gray" onclick="show('sSetup')">← Orqaga</button>
  </div>
</div>

<!-- LOBBY -->
<div class="scr off" id="sLobby">
  <div class="gtitle">🎮 LOBBY</div>
  <div class="gsubt" id="lobbyInfo">Kutilmoqda...</div>
  <div class="plist" id="plist"></div>
  <div style="max-width:380px;width:100%;display:flex;flex-direction:column;gap:7px;margin-top:8px">
    <button class="btn btn-red off" id="btnStart" onclick="hostStart()">▶ O'YINNI BOSHLASH</button>
    <button class="btn btn-gray" onclick="leaveGame()">← Chiqish</button>
  </div>
</div>

<!-- DEAD -->
<div class="scr off" id="sDead">

  <div class="d-killer" id="dKiller"></div>
  <div class="d-cnt" id="dCnt">3</div>
  <div class="d-sub">soniyadan keyin qayta tug'ilasiz</div>
</div>

<!-- HUD -->
<div id="hud" class="off">
  <canvas id="mm" class="minimap" width="90" height="90"></canvas>
  <div class="kills-wrap">
    <div class="kills-num" id="hudKills">0</div>
    <div class="kills-lbl">KILLS</div>
  </div>
  <div class="round-info" id="roundInfo">DUST 2</div>
  <div class="ammo-wrap">
    <div class="weapon-name" id="wName">AK-47</div>
    <div class="ammo-big" id="aNum">30</div>
    <div class="ammo-reserve" id="aRes">/ 90</div>
  </div>
  <div class="hp-wrap">
    <div class="hp-icon">♥</div>
    <div class="hp-bar-outer"><div class="hp-fill" id="hpFill" style="width:100%"></div></div>
    <div class="hp-txt" id="hpTxt">100 HP</div>
  </div>
  <canvas id="xhCanvas" class="xhair" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)"></canvas>
  <div class="kf-list" id="kfList"></div>
  <div id="wbar"></div>
</div>

<!-- SCOPE -->
<div class="scope-wrap" id="scopeWrap">
  <canvas id="scopeCanvas" style="position:absolute;inset:0;width:100%;height:100%"></canvas>
</div>

<!-- CONTROLS -->
<div id="ctrl">
  <div class="stick-z" id="stickZ">
    <div class="stick-base"></div>
    <div class="stick-knob" id="stickKnob"></div>
  </div>
  <div class="look-z" id="lookZ"></div>
  <div class="zoom-z" id="zoomZ" onclick="toggleScope()">🔭</div>
  <div class="reload-z" onclick="reload()">🔄</div>
  <div class="fire-z" id="fireZ">🔫</div>
</div>

<div class="hit-flash" id="hitFlash"></div>
<div class="hit-vignette" id="hitVig"></div>
<div class="toast-msg" id="toast"></div>
<div class="sb-wrap" id="sbWrap">
  <div class="sb-title">📊 NATIJALAR</div>
  <div id="sbRows"></div>
  <button class="btn btn-gray" style="max-width:180px;margin-top:12px" onclick="hideSB()">Yopish</button>
</div>

<script>
// ════════════════════════════════════════════════════════
//  TEXTURE GENERATOR — procedural wall textures
// ════════════════════════════════════════════════════════
const TEX_SIZE = 64;
const texCache = {};

function makeTex(type) {
  if (texCache[type]) return texCache[type];
  const cv = document.createElement('canvas');
  cv.width = TEX_SIZE; cv.height = TEX_SIZE;
  const c = cv.getContext('2d');

  if (type === 'brick') {
    // Mortar
    c.fillStyle = '#5a4030'; c.fillRect(0, 0, TEX_SIZE, TEX_SIZE);
    const bw = 30, bh = 14;
    for (let row = 0; row < 5; row++) {
      const off = (row % 2) * 16;
      for (let col = -1; col < 3; col++) {
        const x = col * bw + off, y = row * (bh + 3) + 2;
        const shade = 0.85 + Math.random() * 0.15;
        const r = Math.floor(160 * shade), g = Math.floor(80 * shade), b = Math.floor(50 * shade);
        c.fillStyle = `rgb(${r},${g},${b})`;
        c.fillRect(x + 1, y, bw - 2, bh);
        // Highlight top
        c.fillStyle = `rgba(255,255,255,0.08)`;
        c.fillRect(x + 1, y, bw - 2, 2);
        // Shadow bottom
        c.fillStyle = `rgba(0,0,0,0.15)`;
        c.fillRect(x + 1, y + bh - 2, bw - 2, 2);
        // Noise
        for (let nx = 0; nx < 4; nx++) {
          c.fillStyle = `rgba(0,0,0,${Math.random() * 0.08})`;
          c.fillRect(x + Math.floor(Math.random() * bw), y + Math.floor(Math.random() * bh), 2, 2);
        }
      }
    }
  } else if (type === 'concrete') {
    const base = c.createLinearGradient(0, 0, TEX_SIZE, TEX_SIZE);
    base.addColorStop(0, '#606070'); base.addColorStop(1, '#484858');
    c.fillStyle = base; c.fillRect(0, 0, TEX_SIZE, TEX_SIZE);
    // Cracks
    c.strokeStyle = 'rgba(0,0,0,0.25)'; c.lineWidth = .5;
    for (let i = 0; i < 5; i++) {
      c.beginPath();
      c.moveTo(Math.random() * TEX_SIZE, Math.random() * TEX_SIZE);
      c.lineTo(Math.random() * TEX_SIZE, Math.random() * TEX_SIZE);
      c.stroke();
    }
    // Noise
    for (let y = 0; y < TEX_SIZE; y += 2) for (let x = 0; x < TEX_SIZE; x += 2) {
      const v = (Math.random() - .5) * 18;
      c.fillStyle = `rgba(${v > 0 ? 255 : 0},${v > 0 ? 255 : 0},${v > 0 ? 255 : 0},${Math.abs(v) / 255})`;
      c.fillRect(x, y, 2, 2);
    }
    // Panel lines
    c.strokeStyle = 'rgba(0,0,0,0.2)'; c.lineWidth = 1;
    for (let i = 0; i < TEX_SIZE; i += 16) { c.beginPath(); c.moveTo(0, i); c.lineTo(TEX_SIZE, i); c.stroke(); }
  } else if (type === 'metal') {
    c.fillStyle = '#2a3040'; c.fillRect(0, 0, TEX_SIZE, TEX_SIZE);
    // Horizontal stripes
    for (let y = 0; y < TEX_SIZE; y += 8) {
      const shade = y % 16 === 0 ? 0.15 : 0.05;
      c.fillStyle = `rgba(255,255,255,${shade})`; c.fillRect(0, y, TEX_SIZE, 4);
    }
    // Rivets
    for (let y = 4; y < TEX_SIZE; y += 16) for (let x = 4; x < TEX_SIZE; x += 16) {
      c.fillStyle = 'rgba(0,0,0,.3)'; c.beginPath(); c.arc(x, y, 2.5, 0, Math.PI * 2); c.fill();
      c.fillStyle = 'rgba(255,255,255,.15)'; c.beginPath(); c.arc(x - .5, y - .5, 1.5, 0, Math.PI * 2); c.fill();
    }
    // Scratch lines
    c.strokeStyle = 'rgba(255,255,255,0.06)'; c.lineWidth = 1;
    for (let i = 0; i < 6; i++) { c.beginPath(); c.moveTo(0, Math.random() * TEX_SIZE); c.lineTo(TEX_SIZE, Math.random() * TEX_SIZE); c.stroke(); }
  } else if (type === 'wood') {
    for (let y = 0; y < TEX_SIZE; y++) {
      const grain = Math.sin(y * 0.5 + Math.random() * 0.2) * 0.15;
      const r = Math.floor(120 + grain * 80), g = Math.floor(75 + grain * 50), b = Math.floor(35 + grain * 20);
      c.fillStyle = `rgb(${r},${g},${b})`; c.fillRect(0, y, TEX_SIZE, 1);
    }
    c.fillStyle = 'rgba(0,0,0,0.12)';
    for (let i = 0; i < 3; i++) { c.fillRect(i * 21 + 10, 0, 1, TEX_SIZE); }
  } else if (type === 'sand') {
    c.fillStyle = '#c8a870'; c.fillRect(0, 0, TEX_SIZE, TEX_SIZE);
    for (let i = 0; i < 300; i++) {
      const x = Math.random() * TEX_SIZE, y = Math.random() * TEX_SIZE;
      const shade = Math.random() * 0.2 - 0.1;
      c.fillStyle = `rgba(${shade > 0 ? 255 : 0},${shade > 0 ? 200 : 0},0,${Math.abs(shade)})`;
      c.fillRect(x, y, 1 + Math.random(), 1 + Math.random());
    }
  } else if (type === 'marble') {
    c.fillStyle = '#d0ccc0'; c.fillRect(0, 0, TEX_SIZE, TEX_SIZE);
    c.strokeStyle = 'rgba(140,130,110,0.4)'; c.lineWidth = 1;
    for (let i = 0; i < 8; i++) {
      c.beginPath();
      let x = Math.random() * TEX_SIZE, y = 0;
      c.moveTo(x, y);
      for (let j = 0; j < 6; j++) { x += (Math.random() - .5) * 20; c.lineTo(x, y + j * 12); }
      c.stroke();
    }
  } else if (type === 'tile') {
    c.fillStyle = '#e8e0d0'; c.fillRect(0, 0, TEX_SIZE, TEX_SIZE);
    c.strokeStyle = 'rgba(0,0,0,0.15)'; c.lineWidth = 1.5;
    for (let i = 0; i <= TEX_SIZE; i += 16) {
      c.beginPath(); c.moveTo(i, 0); c.lineTo(i, TEX_SIZE); c.stroke();
      c.beginPath(); c.moveTo(0, i); c.lineTo(TEX_SIZE, i); c.stroke();
    }
    // Tile shade
    for (let ty = 0; ty < 4; ty++) for (let tx = 0; tx < 4; tx++) {
      if ((tx + ty) % 2 === 0) { c.fillStyle = 'rgba(0,0,0,.03)'; c.fillRect(tx * 16, ty * 16, 16, 16); }
    }
  } else if (type === 'crate') {
    c.fillStyle = '#8b6914'; c.fillRect(0, 0, TEX_SIZE, TEX_SIZE);
    c.strokeStyle = '#5a4010'; c.lineWidth = 2;
    c.strokeRect(3, 3, TEX_SIZE - 6, TEX_SIZE - 6);
    c.beginPath(); c.moveTo(3, 3); c.lineTo(TEX_SIZE - 3, TEX_SIZE - 3); c.stroke();
    c.beginPath(); c.moveTo(TEX_SIZE - 3, 3); c.lineTo(3, TEX_SIZE - 3); c.stroke();
    c.strokeRect(TEX_SIZE / 2 - 8, TEX_SIZE / 2 - 8, 16, 16);
    // Wood grain
    for (let y = 0; y < TEX_SIZE; y += 5) {
      c.fillStyle = `rgba(0,0,0,${Math.random() * .06})`; c.fillRect(0, y, TEX_SIZE, 2);
    }
  } else if (type === 'glass') {
    c.fillStyle = 'rgba(180,220,255,0.3)'; c.fillRect(0, 0, TEX_SIZE, TEX_SIZE);
    c.strokeStyle = 'rgba(255,255,255,0.4)'; c.lineWidth = 1;
    c.strokeRect(2, 2, TEX_SIZE - 4, TEX_SIZE - 4);
    c.strokeRect(TEX_SIZE / 2 - 1, 2, 2, TEX_SIZE - 4);
    c.strokeRect(2, TEX_SIZE / 2 - 1, TEX_SIZE - 4, 2);
    // Reflection
    c.fillStyle = 'rgba(255,255,255,0.15)';
    c.beginPath(); c.moveTo(5, 5); c.lineTo(25, 5); c.lineTo(5, 25); c.closePath(); c.fill();
  }

  const imgData = c.getImageData(0, 0, TEX_SIZE, TEX_SIZE);
  texCache[type] = imgData;
  return imgData;
}

function makeFloorTex(type) {
  const key = 'floor_' + type;
  if (texCache[key]) return texCache[key];
  const cv = document.createElement('canvas'); cv.width = TEX_SIZE; cv.height = TEX_SIZE;
  const c = cv.getContext('2d');
  if (type === 'asphalt') {
    c.fillStyle = '#282828'; c.fillRect(0, 0, TEX_SIZE, TEX_SIZE);
    for (let i = 0; i < 200; i++) { c.fillStyle = `rgba(255,255,255,${Math.random()*.04})`; c.fillRect(Math.random()*TEX_SIZE, Math.random()*TEX_SIZE, 2, 2); }
    c.strokeStyle='rgba(255,255,255,0.06)'; c.lineWidth=1;
    for(let i=0;i<4;i++){c.beginPath();c.moveTo(0,i*16+8);c.lineTo(TEX_SIZE,i*16+8);c.stroke();}
  } else if (type === 'sand_floor') {
    c.fillStyle='#b8956a'; c.fillRect(0,0,TEX_SIZE,TEX_SIZE);
    for(let i=0;i<400;i++){const v=(Math.random()-.5)*.08;c.fillStyle=`rgba(${v>0?255:0},${v>0?200:0},0,${Math.abs(v)})`;c.fillRect(Math.random()*TEX_SIZE,Math.random()*TEX_SIZE,1,1);}
  } else if (type === 'tile_floor') {
    c.fillStyle='#ccccbc'; c.fillRect(0,0,TEX_SIZE,TEX_SIZE);
    c.strokeStyle='rgba(0,0,0,.12)'; c.lineWidth=1;
    for(let i=0;i<=TEX_SIZE;i+=16){c.beginPath();c.moveTo(i,0);c.lineTo(i,TEX_SIZE);c.stroke();c.beginPath();c.moveTo(0,i);c.lineTo(TEX_SIZE,i);c.stroke();}
  } else if (type === 'grass') {
    c.fillStyle='#3a6030'; c.fillRect(0,0,TEX_SIZE,TEX_SIZE);
    for(let i=0;i<300;i++){c.fillStyle=`rgba(${Math.random()>0.5?80:20},${100+Math.random()*40},${Math.random()>0.5?30:10},0.5)`;c.fillRect(Math.random()*TEX_SIZE,Math.random()*TEX_SIZE,1+Math.random(),3+Math.random()*3);}
  } else if (type === 'wood_floor') {
    for(let y=0;y<TEX_SIZE;y++){const g=Math.sin(y*.3)*.1;c.fillStyle=`rgb(${Math.floor(110+g*50)},${Math.floor(70+g*30)},${Math.floor(30+g*15)})`;c.fillRect(0,y,TEX_SIZE,1);}
    c.strokeStyle='rgba(0,0,0,.1)';c.lineWidth=1;
    for(let i=0;i<TEX_SIZE;i+=16){c.beginPath();c.moveTo(i,0);c.lineTo(i,TEX_SIZE);c.stroke();}
  } else {
    c.fillStyle='#2a2a2a'; c.fillRect(0,0,TEX_SIZE,TEX_SIZE);
  }
  const imgData = c.getImageData(0,0,TEX_SIZE,TEX_SIZE);
  texCache[key] = imgData; return imgData;
}

function parseMap(key) {
  const m = MAPS[key]; const rows=[], spawns=[], coins=[];
  m.data.forEach((line, r) => {
    rows.push([]);
    for (let c = 0; c < line.length; c++) {
      const ch = line[c];
      if (ch==='#') rows[r].push(1);
      else if (ch==='p') { spawns.push({x:c+.5,y:r+.5}); rows[r].push(0); }
      else if (ch==='C') { coins.push({x:c+.5,y:r+.5}); rows[r].push(0); }
      else rows[r].push(0);
    }
  });
  return { grid:rows, spawns, coins, rows:m.data.length, cols:m.data[0].length, meta:m };
}

function buildXhair() {
  const cv=document.getElementById('xhCanvas');
  cv.width=30; cv.height=30;
  const c=cv.getContext('2d');
  const cx=15,cy=15,gap=4,len=8;
  c.strokeStyle='rgba(255,255,255,0.9)'; c.lineWidth=1.5;
  c.shadowColor='rgba(0,0,0,0.8)'; c.shadowBlur=2;
  c.beginPath(); c.moveTo(cx,cy-gap-len); c.lineTo(cx,cy-gap); c.stroke();
  c.beginPath(); c.moveTo(cx,cy+gap); c.lineTo(cx,cy+gap+len); c.stroke();
  c.beginPath(); c.moveTo(cx-gap-len,cy); c.lineTo(cx-gap,cy); c.stroke();
  c.beginPath(); c.moveTo(cx+gap,cy); c.lineTo(cx+gap+len,cy); c.stroke();
  c.shadowBlur=0; c.strokeStyle='rgba(0,0,0,0.5)'; c.lineWidth=3;
  c.beginPath(); c.moveTo(cx,cy-gap-len); c.lineTo(cx,cy-gap); c.stroke();
  c.beginPath(); c.moveTo(cx,cy+gap); c.lineTo(cx,cy+gap+len); c.stroke();
  c.beginPath(); c.moveTo(cx-gap-len,cy); c.lineTo(cx-gap,cy); c.stroke();
  c.beginPath(); c.moveTo(cx+gap,cy); c.lineTo(cx+gap+len,cy); c.stroke();
  c.strokeStyle='rgba(255,255,255,0.9)'; c.lineWidth=1.5;
  c.beginPath(); c.moveTo(cx,cy-gap-len); c.lineTo(cx,cy-gap); c.stroke();
  c.beginPath(); c.moveTo(cx,cy+gap); c.lineTo(cx,cy+gap+len); c.stroke();
  c.beginPath(); c.moveTo(cx-gap-len,cy); c.lineTo(cx-gap,cy); c.stroke();
  c.beginPath(); c.moveTo(cx+gap,cy); c.lineTo(cx+gap+len,cy); c.stroke();
}

//  SCOPE
// ════════════════════════════════════════════════════════
function drawScope(){
  const cv=document.getElementById('scopeCanvas');
  cv.width=SW; cv.height=SH;
  const c=cv.getContext('2d');
  const cx=SW/2, cy=SH/2, r=Math.min(SW,SH)*.36;
  c.clearRect(0,0,SW,SH);
  c.fillStyle='rgba(0,0,0,0.97)'; c.fillRect(0,0,SW,SH);
  c.globalCompositeOperation='destination-out';
  c.beginPath(); c.arc(cx,cy,r,0,Math.PI*2); c.fill();
  c.globalCompositeOperation='source-over';
  // Green tint inside
  c.fillStyle='rgba(0,40,0,0.15)';
  c.beginPath(); c.arc(cx,cy,r,0,Math.PI*2); c.fill();
  // Crosshair lines
  c.strokeStyle='rgba(255,255,255,0.85)'; c.lineWidth=1;
  c.beginPath(); c.moveTo(cx-r,cy); c.lineTo(cx+r,cy); c.stroke();
  c.beginPath(); c.moveTo(cx,cy-r); c.lineTo(cx,cy+r); c.stroke();
  // Mil-dot range marks
  for(let i=1;i<=5;i++){
    const gap=r/6*i;
    c.strokeStyle='rgba(255,255,255,0.6)'; c.lineWidth=.8;
    c.beginPath(); c.moveTo(cx-6,cy+gap); c.lineTo(cx+6,cy+gap); c.stroke();
    c.beginPath(); c.moveTo(cx-6,cy-gap); c.lineTo(cx+6,cy-gap); c.stroke();
  }
  // Side marks
  for(let i=1;i<=3;i++){
    const gap=r/4*i;
    c.strokeStyle='rgba(255,255,255,0.4)'; c.lineWidth=.6;
    c.beginPath(); c.moveTo(cx+gap,cy-4); c.lineTo(cx+gap,cy+4); c.stroke();
    c.beginPath(); c.moveTo(cx-gap,cy-4); c.lineTo(cx-gap,cy+4); c.stroke();
  }
  // Circle border
  c.strokeStyle='rgba(255,255,255,0.2)'; c.lineWidth=2;
  c.beginPath(); c.arc(cx,cy,r,0,Math.PI*2); c.stroke();
  c.strokeStyle='rgba(255,255,255,0.08)'; c.lineWidth=1;
  c.beginPath(); c.arc(cx,cy,r+8,0,Math.PI*2); c.stroke();
}

function connectWs(ip){
  try{ ws=new WebSocket(`ws://${ip}:8765`); }catch(e){ toast('❌ Ulanishda xato!'); return; }
  ws.onopen=()=>ws.send(JSON.stringify({t:'hello',name:me.name,color:me.color}));
  ws.onmessage=e=>handleMsg(JSON.parse(e.data));
  ws.onerror=()=>toast('❌ Server topilmadi!');
  ws.onclose=()=>{ if(gameActive) toast('📡 Ulanish uzildi'); };
}
function send(o){ if(ws&&ws.readyState===1) ws.send(JSON.stringify(o)); }

function handleMsg(msg){
  const t=msg.t;
  if(t==='welcome'){
    me.id=msg.id; players={};
    (msg.players||[]).forEach(p=>{ if(p.id!==me.id) players[p.id]={...p,kills:0,deaths:0}; });
    if(isHost){ buildMapGrid(); show('sMap'); }
    else{ updateLobbyUI(); show('sLobby'); document.getElementById('lobbyInfo').textContent='⏳ Host boshlaguncha kuting...'; }
  }
  else if(t==='join'){ players[msg.id]={id:msg.id,name:msg.name,color:msg.color,x:2.5,y:2.5,angle:0,hp:100,dead:false,kills:0,deaths:0,weapon:'AK-47'}; updateLobbyUI(); addKF(`🟢 ${msg.name} qo'shildi`,'#44ff88'); }
  else if(t==='leave'){ delete players[msg.id]; updateLobbyUI(); }
  else if(t==='map_sel'){ selMap=msg.map; }
  else if(t==='start'){ startGame(msg); }
  else if(t==='pos'){ if(players[msg.id]) Object.assign(players[msg.id],{x:msg.x,y:msg.y,angle:msg.a,dead:msg.dead,weapon:msg.weapon||'AK-47'}); }
  else if(t==='shoot'){
    if(msg.id!==me.id){
      shots.push({x:msg.x,y:msg.y,dx:Math.cos(msg.a)*.35,dy:Math.sin(msg.a)*.35,life:14,color:players[msg.id]?.color||'#fff'});
      if(!me.dead){ const h=rayHitMe(msg.x,msg.y,msg.a); if(h) send({t:'hit',victim:me.id,shooter:msg.id,damage:msg.dmg||25}); }
    }
  }
  else if(t==='hit'){
    if(msg.victim===me.id){ me.hp=Math.max(0,me.hp-msg.damage); updateHpHud(); flashHit(); dmgNum(-msg.damage); if(me.hp<=0&&!me.dead){ me.dead=true; me.deaths++; send({t:'dead',id:me.id,killer:msg.shooter}); showDead(players[msg.shooter]?.name||'???'); } }
    else if(players[msg.victim]){ players[msg.victim].hp=Math.max(0,players[msg.victim].hp-msg.damage); spawnBlood(players[msg.victim].x,players[msg.victim].y); }
  }
  else if(t==='dead'){
    if(players[msg.id]) players[msg.id].dead=true;
    if(players[msg.killer]){ players[msg.killer].kills=(players[msg.killer].kills||0)+1; }
    if(msg.killer===me.id){ me.kills++; document.getElementById('hudKills').textContent=me.kills; }
    addKF(`💀 ${players[msg.killer]?.name||'?'} ☠ ${players[msg.id]?.name||'?'}`, msg.killer===me.id?'#ffd700':'#ff4444');
  }
  else if(t==='respawn'){
    if(msg.id===me.id){ me.x=msg.x;me.y=msg.y;me.hp=100;me.dead=false;const w=GUNS[me.weapon];me.ammo=w.mag;me.reserve=w.res;updateHpHud();updateAmmoHud();show('sGame');gameActive=true; }
    else if(players[msg.id]) Object.assign(players[msg.id],{x:msg.x,y:msg.y,hp:100,dead:false});
  }
}

  const all=[me,...Object.values(players)];

function buildWBar(){
  const bar=document.getElementById('wbar');
  bar.innerHTML=me.inventory.map((w,i)=>{
    const g=GUNS[w];
    return `<div class="wslot ${w===me.weapon?'on':''}" id="ws${i}" onclick="switchGun('${w}')"><span class="wi">${g.cat==='knife'?'🔪':g.cat==='sniper'?'🎯':g.cat==='shotgun'?'💥':g.cat==='mg'?'🔥':g.cat==='smg'?'🔧':'🔫'}</span>${w.length>7?w.slice(0,6):w}</div>`;
  }).join('');
}

function switchGun(wname){
  if(me.reloading||!me.inventory.includes(wname)) return;
  stopFire(); me.weapon=wname;
  const g=GUNS[wname];
  if(!me.wAmmo[wname]) me.wAmmo[wname]={ammo:g.mag,res:g.res};
  me.ammo=me.wAmmo[wname].ammo; me.reserve=me.wAmmo[wname].res;
  if(me.scoped&&!g.scope){ me.scoped=false; document.getElementById('scopeWrap').style.display='none'; document.getElementById('xhCanvas').style.display='block'; }
  updateAmmoHud(); buildWBar();
  document.getElementById('zoomZ').style.display=g.scope?'flex':'none';
}

function cycleGun(d){ const i=me.inventory.indexOf(me.weapon); switchGun(me.inventory[(i+d+me.inventory.length)%me.inventory.length]); }

function reload(){
  if(!gameActive||me.dead||me.reloading) return;
  const g=GUNS[me.weapon]; if(g.cat==='knife'||me.ammo===g.mag||me.reserve<=0) return;
  me.reloading=true; updateAmmoHud(); stopFire();
  setTimeout(()=>{
    const need=g.mag-me.ammo,take=Math.min(need,me.reserve);
    me.ammo+=take; me.reserve-=take;
    me.wAmmo[me.weapon]={ammo:me.ammo,res:me.reserve};
    me.reloading=false; updateAmmoHud(); toast('✅ Yuklandi!',600);
  }, g.reload);
}

function toggleScope(){
  const g=GUNS[me.weapon]; if(!g.scope) return;
  me.scoped=!me.scoped;
  document.getElementById('scopeWrap').style.display=me.scoped?'block':'none';
  document.getElementById('xhCanvas').style.display=me.scoped?'none':'block';
  if(me.scoped) drawScope();
}

// ════════════════════════════════════════════════════════
function startFire(){
  if(autoOn) return;
  const g=GUNS[me.weapon];
  autoOn=true; shoot();
  if(g.auto) autoFire=setInterval(shoot,g.rate);
}
function stopFire(){ autoOn=false; if(autoFire){clearInterval(autoFire);autoFire=null;} }

function shoot(){
  if(!gameActive||me.dead||me.reloading) return;
  const g=GUNS[me.weapon];
  const now2=Date.now();
  if(now2-me.lastShot<g.rate) return;
  me.lastShot=now2;
  if(me.ammo<=0){ reload(); return; }
  me.ammo--; me.wAmmo[me.weapon]={ammo:me.ammo,res:me.reserve};
  updateAmmoHud(); muzzle=10;

  if(g.cat==='knife'){
    Object.values(players).forEach(p=>{ if(!p||p.dead) return; if(Math.hypot(p.x-me.x,p.y-me.y)<g.rng) send({t:'hit',victim:p.id,shooter:me.id,damage:g.dmg}); });
    return;
  }

  const pellets=g.pellets||1;
  for(let k=0;k<pellets;k++){
    const sp=me.scoped?g.spread*.08:g.spread;
    const a=me.angle+(Math.random()-.5)*sp;
    shots.push({x:me.x+Math.cos(a)*.5,y:me.y+Math.sin(a)*.5,dx:Math.cos(a)*.4,dy:Math.sin(a)*.4,life:15,color:'#ffeecc'});
    send({t:'shoot',id:me.id,x:me.x,y:me.y,a,dmg:Math.floor(g.dmg/pellets)});

    let hit=null,minD=g.rng;
    Object.values(players).forEach(p=>{ if(!p||p.dead) return; if(rayHitsP(me.x,me.y,a,p.x,p.y,g.rng)){const d=Math.hypot(p.x-me.x,p.y-me.y);if(d<minD){minD=d;hit=p;}} });
    if(hit){ send({t:'hit',victim:hit.id,shooter:me.id,damage:Math.floor(g.dmg/pellets)}); spawnBlood(hit.x,hit.y); }
  }
  if(me.ammo===0) setTimeout(reload,300);
}

function rayHitMe(ox,oy,a){ return rayHitsP(ox,oy,a,me.x,me.y,25); }
function rayHitsP(ox,oy,a,px,py,mr){
  const dx=px-ox,dy=py-oy,dist=Math.sqrt(dx*dx+dy*dy);
  if(dist>mr||dist<.3) return false;
  let diff=Math.atan2(dy,dx)-a;
  while(diff>Math.PI)diff-=Math.PI*2; while(diff<-Math.PI)diff+=Math.PI*2;
  if(Math.abs(diff)>.18) return false;
  const steps=Math.floor(dist*3);
  for(let i=1;i<steps;i++){ if(isWall(ox+dx*i/steps,oy+dy*i/steps)) return false; }
  return true;
}

function spawnBlood(x,y){
  for(let i=0;i<8;i++) blood.push({x:x+(Math.random()-.5)*.5,y:y+(Math.random()-.5)*.5,vx:(Math.random()-.5)*.08,vy:(Math.random()-.5)*.08,size:.08+Math.random()*.12,life:20+Math.random()*12});
  decals.push({x,y,r:0.15+Math.random()*.2});
}

function isWall(cx,cy){
  if(!mapData) return false;
  const mx=Math.floor(cx),my=Math.floor(cy);
  if(mx<0||mx>=mapData.cols||my<0||my>=mapData.rows) return true;
  return mapData.grid[my][mx]>0;
}
function move(dx,dy){
  const r=.3,nx=me.x+dx,ny=me.y+dy;
  if(!isWall(nx+Math.sign(dx)*r,me.y+r)&&!isWall(nx+Math.sign(dx)*r,me.y-r)) me.x=nx;
  if(!isWall(me.x+r,ny+Math.sign(dy)*r)&&!isWall(me.x-r,ny+Math.sign(dy)*r)) me.y=ny;
}

// ════════════════════════════════════════════════════════
//  TEXTURED RAYCASTING
// ════════════════════════════════════════════════════════
const screenBuf = document.createElement('canvas');
screenBuf.width = RW; screenBuf.height = RH;
const sbCtx = screenBuf.getContext('2d');
let screenData, screenPx;

function castRays(){
  if(!mapData) return;
  const meta=mapData.meta;
  const fovFactor=me.scoped?.28:1;
  const fov=Math.PI/3*fovFactor;
  const hfov=fov/2;
  const cosA=Math.cos(me.angle),sinA=Math.sin(me.angle);
  const plX=sinA*Math.tan(hfov),plY=-cosA*Math.tan(hfov);
  const fogD=meta.fog||14;

  // Get screen pixel buffer for fast rendering
  screenData=sbCtx.createImageData(RW,RH);
  screenPx=screenData.data;

  // Sky — gradient fill
  const skyTop=me.scoped?[5,8,15]:[15,25,60];
  const skyBot=me.scoped?[8,15,25]:[40,55,100];
  for(let y=0;y<RH/2;y++){
    const t=y/(RH/2);
    const r=Math.floor(skyTop[0]*(1-t)+skyBot[0]*t);
    const g=Math.floor(skyTop[1]*(1-t)+skyBot[1]*t);
    const b=Math.floor(skyTop[2]*(1-t)+skyBot[2]*t);
    for(let x=0;x<RW;x++){
      const i=(y*RW+x)*4;
      screenPx[i]=r;screenPx[i+1]=g;screenPx[i+2]=b;screenPx[i+3]=255;
    }
  }

  // Textured floor/ceiling
  const floorTex=makeFloorTex(meta.floor||'asphalt');
  const floorPx=floorTex.data;
  for(let y=Math.floor(RH/2);y<RH;y++){
    const rowDist=RH/(2*y-RH+.001);
    const floorX=cosA*.5-plX*1, floorY=sinA*.5-plY*1;
    const stepX=(2*plX)/RW*rowDist, stepY=(2*plY)/RW*rowDist;
    let fx=me.x*rowDist+(cosA*.5-plX)*rowDist+stepX*0;
    let fy=me.y*rowDist+(sinA*.5-plY)*rowDist+stepY*0;
    const fog=Math.min(1,rowDist/fogD*1.5);
    for(let x=0;x<RW;x++){
      const tx=Math.floor(fx%1*TEX_SIZE+TEX_SIZE)%TEX_SIZE;
      const ty=Math.floor(fy%1*TEX_SIZE+TEX_SIZE)%TEX_SIZE;
      const fi=(ty*TEX_SIZE+tx)*4;
      const i=(y*RW+x)*4;
      screenPx[i]=Math.floor(floorPx[fi]*(1-fog)+8*fog);
      screenPx[i+1]=Math.floor(floorPx[fi+1]*(1-fog)+8*fog);
      screenPx[i+2]=Math.floor(floorPx[fi+2]*(1-fog)+8*fog);
      screenPx[i+3]=255;
      // Ceiling mirror slightly darker
      const ci=((RH-y-1)*RW+x)*4;
      const cDim=.35;
      screenPx[ci]=Math.floor(floorPx[fi]*cDim*(1-fog)+8*fog);
      screenPx[ci+1]=Math.floor(floorPx[fi+1]*cDim*(1-fog)+8*fog);
      screenPx[ci+2]=Math.floor(floorPx[fi+2]*cDim*(1-fog)+8*fog);
      screenPx[ci+3]=255;
      fx+=stepX; fy+=stepY;
    }
  }

  // Walls — textured raycasting
  const texTypes=meta.wallTex||['brick','concrete','metal'];
  const wallTex0=makeTex(texTypes[0]||'brick');
  const wallTex1=makeTex(texTypes[1]||'concrete');
  const wallTex2=makeTex(texTypes[2]||'metal');
  const wallTexPx=[wallTex0.data,wallTex1.data,wallTex2.data];

  for(let x=0;x<RW;x++){
    const cx2=2*x/RW-1;
    const rdx=cosA+plX*cx2, rdy=sinA+plY*cx2;
    let mx=Math.floor(me.x),my=Math.floor(me.y);
    const ddx=Math.abs(1/rdx),ddy=Math.abs(1/rdy);
    let stepX,stepY,sdx,sdy;
    if(rdx<0){stepX=-1;sdx=(me.x-mx)*ddx;}else{stepX=1;sdx=(mx+1-me.x)*ddx;}
    if(rdy<0){stepY=-1;sdy=(me.y-my)*ddy;}else{stepY=1;sdy=(my+1-me.y)*ddy;}
    let side=0,hit=false,depth=0;
    while(!hit&&depth<32){ if(sdx<sdy){sdx+=ddx;mx+=stepX;side=0;}else{sdy+=ddy;my+=stepY;side=1;} depth++; if(mx<0||mx>=mapData.cols||my<0||my>=mapData.rows||mapData.grid[my][mx]>0)hit=true; }
    const pd=side===0?(mx-me.x+(1-stepX)/2)/rdx:(my-me.y+(1-stepY)/2)/rdy;
    zbuf[x]=pd;
    const lh=Math.floor(RH/Math.max(.1,pd));
    const y0=Math.max(0,Math.floor(RH/2-lh/2));
    const y1=Math.min(RH-1,Math.floor(RH/2+lh/2));

    // Texture X coordinate
    let wallX;
    if(side===0) wallX=me.y+pd*rdy; else wallX=me.x+pd*rdx;
    wallX-=Math.floor(wallX);
    let tx=Math.floor(wallX*TEX_SIZE);
    if((side===0&&rdx>0)||(side===1&&rdy<0)) tx=TEX_SIZE-tx-1;

    // Select texture by map cell type
    const wtype=mapData.grid[Math.max(0,Math.min(mapData.rows-1,my))][Math.max(0,Math.min(mapData.cols-1,mx))];
    const tPx=wallTexPx[Math.min(wtype-1,2)]||wallTexPx[0];

    // Fog + side shading
    const fog=Math.min(1,pd/fogD);
    const shade=side===1?.72:.92;

    for(let y=y0;y<=y1;y++){
      const ty=Math.floor((y-y0)*TEX_SIZE/(y1-y0+1));
      const fi=(ty*TEX_SIZE+tx)*4;
      const i=(y*RW+x)*4;
      screenPx[i]=Math.floor(tPx[fi]*shade*(1-fog)+6*fog);
      screenPx[i+1]=Math.floor(tPx[fi+1]*shade*(1-fog)+6*fog);
      screenPx[i+2]=Math.floor(tPx[fi+2]*shade*(1-fog)+6*fog);
      screenPx[i+3]=255;
    }
  }

  sbCtx.putImageData(screenData,0,0);
  ctx.drawImage(screenBuf,0,0);
}

// ════════════════════════════════════════════════════════
//  SPRITES
// ════════════════════════════════════════════════════════
function renderSprites(){
  const fovFactor=me.scoped?.28:1;
  const fov=Math.PI/3*fovFactor;
  const hfov=fov/2;
  const cosA=Math.cos(me.angle),sinA=Math.sin(me.angle);
  const plX=sinA*Math.tan(hfov),plY=-cosA*Math.tan(hfov);

  const all=[];
  Object.values(players).forEach(p=>{ if(!p||p.dead) return; const dx=p.x-me.x,dy=p.y-me.y; all.push({type:'player',p,dx,dy,dist:Math.sqrt(dx*dx+dy*dy)}); });
  shots.forEach(s=>{ const dx=s.x-me.x,dy=s.y-me.y; all.push({type:'shot',s,dx,dy,dist:Math.sqrt(dx*dx+dy*dy)}); });
  blood.forEach(b=>{ const dx=b.x-me.x,dy=b.y-me.y; all.push({type:'blood',b,dx,dy,dist:Math.sqrt(dx*dx+dy*dy)}); });
  all.sort((a,b)=>b.dist-a.dist);

  all.forEach(sp=>{
    const {dx,dy}=sp;
    const tX=cosA*dy-sinA*dx, tY=sinA*dy+cosA*dx;
    if(tY<=.15) return;
    const scrX=Math.floor(RW/2*(1+tX/tY));

    if(sp.type==='player'){
      const p=sp.p;
      const h=Math.abs(Math.floor(RH/tY));
      const bw=Math.floor(h*.48), bh=Math.floor(h*.68);
      const x0=Math.floor(scrX-bw/2);
      const y0=Math.floor(RH/2-h/2);
      const hh=Math.floor(h*.22), hw=Math.floor(bw*.7), hx0=Math.floor(x0+bw*.15);
      const fog=Math.min(1,sp.dist/14);

      for(let sx=Math.max(0,x0);sx<Math.min(RW,x0+bw);sx++){
        if(zbuf[sx]<=tY) continue;
        // Body
        const prog=(sx-x0)/bw;
        const isEdge=prog<.05||prog>.95;
        const bodyY=y0+Math.floor(h*.17);
        // Clothing — tactical outfit
        for(let sy=bodyY;sy<bodyY+bh;sy++){
          const vy=(sy-bodyY)/bh;
          const pct=1-fog;
          // Body shade
          const r2=isEdge?0:Math.floor(50*pct);
          const g2=isEdge?0:Math.floor(70*pct);
          const b2=isEdge?0:Math.floor(55*pct);
          const i=(sy*RW+sx)*4;
          if(i>=0&&i<screenPx.length-3){screenPx[i]=r2;screenPx[i+1]=g2;screenPx[i+2]=b2;screenPx[i+3]=255;}
        }
        // Head
        if(sx>=hx0&&sx<hx0+hw){
          for(let sy=y0;sy<y0+hh;sy++){
            const i=(sy*RW+sx)*4;
            const skin=Math.floor(220*(1-fog));
            if(i>=0&&i<screenPx.length-3){screenPx[i]=skin;screenPx[i+1]=Math.floor(180*(1-fog));screenPx[i+2]=Math.floor(150*(1-fog));screenPx[i+3]=255;}
          }
          // Helmet
          for(let sy=y0;sy<y0+Math.floor(hh*.4);sy++){
            const i=(sy*RW+sx)*4;
            if(i>=0&&i<screenPx.length-3){screenPx[i]=40;screenPx[i+1]=40;screenPx[i+2]=40;screenPx[i+3]=255;}
          }
        }
        // Team color stripe on shoulder
        const stripeY=bodyY+Math.floor(bh*.08);
        for(let sy=stripeY;sy<stripeY+Math.floor(bh*.08);sy++){
          const i=(sy*RW+sx)*4;
          const cr=parseInt(p.color.slice(1,3),16), cg2=parseInt(p.color.slice(3,5),16), cb=parseInt(p.color.slice(5,7),16);
          if(i>=0&&i<screenPx.length-3){screenPx[i]=Math.floor(cr*(1-fog));screenPx[i+1]=Math.floor(cg2*(1-fog));screenPx[i+2]=Math.floor(cb*(1-fog));screenPx[i+3]=255;}
        }
      }
      sbCtx.putImageData(screenData,0,0); ctx.drawImage(screenBuf,0,0);

      // Name tag
      if(tY<12){
        let nt=document.getElementById('nt_'+p.id);
        if(!nt){nt=document.createElement('div');nt.className='ntag';nt.id='nt_'+p.id;document.getElementById('hud').appendChild(nt);}
        nt.style.left=(scrX/RW*SW)+'px';nt.style.top=(y0/RH*SH)+'px';
        nt.style.color=p.color;
        nt.style.borderLeft=`3px solid ${p.color}`;
        nt.textContent=`${p.name} ♥${p.hp}`;
        nt.style.display='block';
      } else { const nt=document.getElementById('nt_'+p.id);if(nt)nt.style.display='none'; }

    } else if(sp.type==='shot'){
      const sz=Math.max(2,Math.floor(8/tY));
      const sx=Math.max(0,Math.min(RW-1,scrX));
      ctx.fillStyle='rgba(255,240,180,'+sp.s.life/15+')';
      ctx.shadowColor='#ffaa44'; ctx.shadowBlur=4;
      ctx.fillRect(sx-sz/2,RH/2-sz/2,sz,sz);
      ctx.shadowBlur=0;
    } else if(sp.type==='blood'){
      const sz=Math.max(1,Math.floor(4/tY));
      const sx=Math.max(0,Math.min(RW-1,scrX));
      ctx.fillStyle=`rgba(180,0,0,${sp.b.life/25})`;
      ctx.fillRect(sx,RH/2+2,sz,sz);
    }
  });
}

// ════════════════════════════════════════════════════════
//  WEAPON RENDERING — CS2 STYLE
// ════════════════════════════════════════════════════════
function renderWeapon(){
  if(!gameActive||me.dead) return;
  const g=GUNS[me.weapon];
  if(me.scoped) return;
  const bob=Math.sin(Date.now()*.0045)*(stickAct?2.8:.5);
  const sway=Math.cos(Date.now()*.0022)*(stickAct?1.5:.3);
  const recoil=muzzle>0?(muzzle/10)*6:0;

  ctx.save();

  if(g.cat==='knife'){
    const kx=RW*.65+sway,ky=RH*.55+bob-recoil;
    ctx.save(); ctx.translate(kx,ky); ctx.rotate(-.35);
    // Blade
    ctx.fillStyle='#c8c8d0';
    ctx.beginPath(); ctx.moveTo(-2,-RH*.3); ctx.lineTo(4,-RH*.3); ctx.lineTo(2,0); ctx.lineTo(-2,0); ctx.closePath(); ctx.fill();
    // Blade shine
    ctx.fillStyle='rgba(255,255,255,.3)';
    ctx.beginPath(); ctx.moveTo(-1,-RH*.3); ctx.lineTo(1,-RH*.3); ctx.lineTo(0,0); ctx.closePath(); ctx.fill();
    // Edge
    ctx.strokeStyle='#888'; ctx.lineWidth=.5;
    ctx.beginPath(); ctx.moveTo(2,-RH*.3); ctx.lineTo(2,0); ctx.stroke();
    // Guard
    ctx.fillStyle='#555'; ctx.fillRect(-5,0,14,5);
    // Handle
    ctx.fillStyle='#2a1a0a';
    for(let i=0;i<4;i++){ctx.fillStyle=i%2===0?'#2a1a0a':'#3a2a1a';ctx.fillRect(-4,5+i*8,12,8);}
    ctx.restore();
  } else if(g.cat==='sniper'){
    drawSniper(g,sway,bob,recoil);
  } else if(g.cat==='shotgun'){
    drawShotgun(g,sway,bob,recoil);
  } else if(g.cat==='mg'){
    drawMG(g,sway,bob,recoil);
  } else if(g.cat==='pistol'){
    drawPistol(g,sway,bob,recoil);
  } else if(g.cat==='smg'){
    drawSMG(g,sway,bob,recoil);
  } else {
    drawRifle(g,sway,bob,recoil);
  }

  ctx.restore();

  // Muzzle flash
  if(muzzle>0){
    const mx=RW*.48,my=RH*.38-recoil;
    ctx.save();
    ctx.globalAlpha=muzzle/10;
    ctx.shadowColor='#ff8800'; ctx.shadowBlur=12;
    ctx.fillStyle='#fff8';
    ctx.beginPath(); ctx.ellipse(mx,my,14,6,-.2,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,180,60,.8)';
    ctx.beginPath(); ctx.ellipse(mx+6,my,8,4,0,0,Math.PI*2); ctx.fill();
    ctx.restore();
    muzzle--;
  }

  // Reload animation text
  if(me.reloading){
    ctx.save();
    ctx.fillStyle='rgba(255,200,50,.9)';
    ctx.font=`bold ${Math.floor(RH*.065)}px monospace`;
    ctx.textAlign='center';
    ctx.shadowColor='#000'; ctx.shadowBlur=4;
    ctx.fillText('● RELOADING',RW*.5,RH*.82);
    ctx.restore();
  }
}

function drawRifle(g,sw,bob,rec){
  const wx=RW*.48+sw, wy=RH*.62+bob-rec;
  const c=g.color||'#334';
  // Stock
  ctx.fillStyle='#1a1a1a'; ctx.fillRect(wx+RW*.18,wy+2,RW*.14,RH*.17);
  // Body
  ctx.fillStyle=c; ctx.fillRect(wx,wy,RW*.35,RH*.18);
  // Top rail
  ctx.fillStyle='#111'; ctx.fillRect(wx+4,wy-4,RW*.32,4);
  // Handguard
  ctx.fillStyle='#222'; ctx.fillRect(wx+4,wy,RW*.2,RH*.18);
  // Grip
  ctx.fillStyle='#111';
  ctx.beginPath(); ctx.moveTo(wx+RW*.22,wy+RH*.18); ctx.lineTo(wx+RW*.22+10,wy+RH*.18+RH*.14); ctx.lineTo(wx+RW*.22+16,wy+RH*.18+RH*.14); ctx.lineTo(wx+RW*.22+6,wy+RH*.18); ctx.closePath(); ctx.fill();
  // Barrel
  ctx.fillStyle='#0a0a0a'; ctx.fillRect(wx+4,wy-2,RW*.06,6);
  // Mag
  ctx.fillStyle='#1a1a1a';
  ctx.beginPath(); ctx.moveTo(wx+RW*.14,wy+RH*.18); ctx.lineTo(wx+RW*.14-4,wy+RH*.3); ctx.lineTo(wx+RW*.14+8,wy+RH*.3); ctx.lineTo(wx+RW*.14+12,wy+RH*.18); ctx.closePath(); ctx.fill();
  // Sight
  ctx.fillStyle='#444'; ctx.fillRect(wx+RW*.28,wy-7,8,5);
  ctx.fillStyle='#ff0'; ctx.fillRect(wx+RW*.28+3,wy-7,2,2);
  // Texture lines
  ctx.strokeStyle='rgba(0,0,0,.3)'; ctx.lineWidth=1;
  for(let i=0;i<5;i++){ctx.beginPath();ctx.moveTo(wx+RW*.02*i+4,wy);ctx.lineTo(wx+RW*.02*i+4,wy+RH*.18);ctx.stroke();}
}

function drawSMG(g,sw,bob,rec){
  const wx=RW*.5+sw, wy=RH*.63+bob-rec;
  const c=g.color||'#334';
  ctx.fillStyle='#111'; ctx.fillRect(wx+RW*.14,wy+2,RW*.1,RH*.14);
  ctx.fillStyle=c; ctx.fillRect(wx,wy,RW*.28,RH*.14);
  ctx.fillStyle='#0a0a0a'; ctx.fillRect(wx+2,wy-2,RW*.04,4);
  ctx.fillStyle='#1a1a1a';
  ctx.beginPath(); ctx.moveTo(wx+RW*.1,wy+RH*.14); ctx.lineTo(wx+RW*.1-3,wy+RH*.24); ctx.lineTo(wx+RW*.1+9,wy+RH*.24); ctx.lineTo(wx+RW*.1+12,wy+RH*.14); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#111';
  ctx.beginPath(); ctx.moveTo(wx+RW*.22,wy+RH*.14); ctx.lineTo(wx+RW*.22+8,wy+RH*.22); ctx.lineTo(wx+RW*.22+14,wy+RH*.22); ctx.lineTo(wx+RW*.22+6,wy+RH*.14); ctx.closePath(); ctx.fill();
}

function drawPistol(g,sw,bob,rec){
  const wx=RW*.58+sw, wy=RH*.63+bob-rec;
  const c=g.color||'#888';
  // Slide
  ctx.fillStyle='#222'; ctx.fillRect(wx,wy-6,RW*.18,10);
  // Body
  ctx.fillStyle=c; ctx.fillRect(wx+4,wy+4,RW*.13,RH*.15);
  // Barrel
  ctx.fillStyle='#0a0a0a'; ctx.fillRect(wx,wy-8,RW*.04,5);
  // Grip texture
  ctx.strokeStyle='rgba(0,0,0,.2)'; ctx.lineWidth=1;
  for(let i=0;i<4;i++){ctx.beginPath();ctx.moveTo(wx+4,wy+4+i*8);ctx.lineTo(wx+4+RW*.13,wy+4+i*8);ctx.stroke();}
  // Trigger guard
  ctx.strokeStyle='#1a1a1a'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.arc(wx+RW*.09,wy+RH*.15,8,-Math.PI,0); ctx.stroke();
  // Sight dot
  ctx.fillStyle='#f00'; ctx.fillRect(wx+RW*.12,wy-9,2,2);
}

function drawSniper(g,sw,bob,rec){
  const wx=RW*.35+sw, wy=RH*.62+bob-rec;
  const c=g.color||'#446';
  // Long barrel
  ctx.fillStyle='#0a0a0a'; ctx.fillRect(wx,wy-1,RW*.12,5);
  // Suppressor
  if(g.cat==='sniper'){ ctx.fillStyle='#333'; ctx.fillRect(wx,wy-3,RW*.04,9); }
  // Body
  ctx.fillStyle=c; ctx.fillRect(wx+RW*.09,wy,RW*.4,RH*.16);
  // Stock
  ctx.fillStyle='#2a1a0a'; ctx.fillRect(wx+RW*.38,wy+2,RW*.14,RH*.12);
  // Scope
  ctx.fillStyle='#1a1a1a'; ctx.fillRect(wx+RW*.16,wy-10,RW*.18,10);
  ctx.fillStyle='#0a0a0a'; ctx.beginPath(); ctx.arc(wx+RW*.16+6,wy-5,4,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(wx+RW*.34-6,wy-5,4,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='rgba(100,200,255,.4)'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(wx+RW*.16+10,wy-5); ctx.lineTo(wx+RW*.34-10,wy-5); ctx.stroke();
  // Grip
  ctx.fillStyle='#111';
  ctx.beginPath(); ctx.moveTo(wx+RW*.28,wy+RH*.16); ctx.lineTo(wx+RW*.28+10,wy+RH*.28); ctx.lineTo(wx+RW*.28+16,wy+RH*.28); ctx.lineTo(wx+RW*.28+6,wy+RH*.16); ctx.closePath(); ctx.fill();
  // Bipod
  ctx.strokeStyle='#555'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(wx+RW*.1,wy+RH*.16); ctx.lineTo(wx+RW*.08,wy+RH*.28); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(wx+RW*.14,wy+RH*.16); ctx.lineTo(wx+RW*.16,wy+RH*.28); ctx.stroke();
}

function drawShotgun(g,sw,bob,rec){
  const wx=RW*.4+sw, wy=RH*.63+bob-rec;
  ctx.fillStyle='#3a2010'; ctx.fillRect(wx,wy,RW*.38,RH*.2);
  // Double barrel hint
  ctx.fillStyle='#0a0a0a'; ctx.fillRect(wx,wy-2,RW*.06,6);
  ctx.fillStyle='#111'; ctx.fillRect(wx,wy+3,RW*.06,6);
  // Wood stock
  ctx.fillStyle='#5a3010'; ctx.fillRect(wx+RW*.28,wy+4,RW*.16,RH*.14);
  ctx.strokeStyle='rgba(0,0,0,.2)'; ctx.lineWidth=1;
  for(let i=0;i<4;i++){ctx.beginPath();ctx.moveTo(wx+RW*.28,wy+4+i*8);ctx.lineTo(wx+RW*.44,wy+4+i*8);ctx.stroke();}
  ctx.fillStyle='#1a1a1a';
  ctx.beginPath(); ctx.moveTo(wx+RW*.2,wy+RH*.2); ctx.lineTo(wx+RW*.2+8,wy+RH*.32); ctx.lineTo(wx+RW*.2+16,wy+RH*.32); ctx.lineTo(wx+RW*.2+8,wy+RH*.2); ctx.closePath(); ctx.fill();
}

function drawMG(g,sw,bob,rec){
  const wx=RW*.3+sw, wy=RH*.61+bob-rec;
  ctx.fillStyle='#1a1a1a'; ctx.fillRect(wx,wy,RW*.5,RH*.2);
  ctx.fillStyle='#0a0a0a'; ctx.fillRect(wx,wy-2,RW*.1,6);
  // Ammo belt hint
  ctx.fillStyle='#8b6914';
  for(let i=0;i<8;i++){ctx.fillRect(wx+RW*.2+i*10,wy+RH*.18,6,8);}
  ctx.fillStyle='#111';
  ctx.beginPath(); ctx.moveTo(wx+RW*.32,wy+RH*.2); ctx.lineTo(wx+RW*.32+12,wy+RH*.3); ctx.lineTo(wx+RW*.32+18,wy+RH*.3); ctx.lineTo(wx+RW*.32+6,wy+RH*.2); ctx.closePath(); ctx.fill();
  ctx.strokeStyle='#555'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(wx+RW*.05,wy+RH*.2); ctx.lineTo(wx+RW*.02,wy+RH*.32); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(wx+RW*.1,wy+RH*.2); ctx.lineTo(wx+RW*.12,wy+RH*.32); ctx.stroke();
}

// ════════════════════════════════════════════════════════
//  MINIMAP — realistic
// ════════════════════════════════════════════════════════
function renderMinimap(){
  if(!mapData) return;
  const cs=3, view=15;
  mmc.fillStyle='rgba(0,5,10,.85)'; mmc.fillRect(0,0,90,90);
  const ox=Math.max(0,Math.min(mapData.cols-view,Math.floor(me.x)-view/2));
  const oy=Math.max(0,Math.min(mapData.rows-view,Math.floor(me.y)-view/2));

  for(let r=0;r<view&&oy+r<mapData.rows;r++){
    for(let c=0;c<view&&ox+c<mapData.cols;c++){
      const v=mapData.grid[oy+r]?.[ox+c];
      if(v){ mmc.fillStyle='#3a4060'; mmc.fillRect(c*cs,r*cs,cs-1,cs-1); mmc.fillStyle='rgba(255,255,255,.06)'; mmc.fillRect(c*cs,r*cs,cs-1,1); }
    }
  }

  // Field of view cone
  const px=(me.x-ox)*cs, py=(me.y-oy)*cs;
  const fovAngle=Math.PI/3*.5;
  mmc.fillStyle='rgba(255,200,50,.08)';
  mmc.beginPath(); mmc.moveTo(px,py);
  mmc.arc(px,py,20,me.angle-fovAngle,me.angle+fovAngle);
  mmc.closePath(); mmc.fill();

  // Other players
  Object.values(players).forEach(p=>{
    if(p.dead) return;
    const ppx=(p.x-ox)*cs,ppy=(p.y-oy)*cs;
    mmc.fillStyle=p.color;
    mmc.beginPath(); mmc.arc(ppx,ppy,3,0,Math.PI*2); mmc.fill();
    mmc.strokeStyle='rgba(0,0,0,.5)'; mmc.lineWidth=1;
    mmc.stroke();
  });

  // Player dot + direction
  mmc.fillStyle='#fff';
  mmc.beginPath(); mmc.arc(px,py,3.5,0,Math.PI*2); mmc.fill();
  mmc.strokeStyle='rgba(255,220,50,.8)'; mmc.lineWidth=1.5;
  mmc.beginPath(); mmc.moveTo(px,py); mmc.lineTo(px+Math.cos(me.angle)*9,py+Math.sin(me.angle)*9); mmc.stroke();

  // Border
  mmc.strokeStyle='rgba(255,255,255,.1)'; mmc.lineWidth=1;
  mmc.strokeRect(0,0,90,90);
}

// ════════════════════════════════════════════════════════
//  GAME LOOP
// ════════════════════════════════════════════════════════
let lastF=0;
function loop(ts){
  frame++;
  const dt=Math.min(ts-lastF,50); lastF=ts;
  requestAnimationFrame(loop);
  if(!gameActive||!mapData) return;

  const g=GUNS[me.weapon];
  const spd=g.cat==='mg'?.052:g.cat==='sniper'?.060:.078;
  let dx=0,dy=0;
  if(K['w']||K['ArrowUp']||stickDy<-.2){dx+=Math.cos(me.angle)*spd;dy+=Math.sin(me.angle)*spd;}
  if(K['s']||K['ArrowDown']||stickDy>.2){dx-=Math.cos(me.angle)*spd;dy-=Math.sin(me.angle)*spd;}
  if(K['a']||stickDx<-.2){dx+=Math.cos(me.angle-Math.PI/2)*spd;dy+=Math.sin(me.angle-Math.PI/2)*spd;}
  if(K['d']||stickDx>.2){dx+=Math.cos(me.angle+Math.PI/2)*spd;dy+=Math.sin(me.angle+Math.PI/2)*spd;}
  if(!me.dead&&(dx||dy)) move(dx,dy);
  if(K['ArrowLeft']) me.angle-=.028;
  if(K['ArrowRight']) me.angle+=.028;

  const now2=Date.now();
  if(now2-lastPos>45){ send({t:'pos',x:me.x,y:me.y,a:me.angle,dead:me.dead,weapon:me.weapon}); lastPos=now2; }

  shots.forEach(s=>{s.x+=s.dx;s.y+=s.dy;s.life--;});
  shots=shots.filter(s=>s.life>0&&!isWall(s.x,s.y));
  blood.forEach(b=>{b.x+=b.vx;b.y+=b.vy;b.life--;});
  blood=blood.filter(b=>b.life>0);

  ctx.clearRect(0,0,RW,RH);
  castRays();
  renderSprites();
  renderWeapon();
  renderMinimap();
  if(me.scoped) drawScope();
}
requestAnimationFrame(loop);

// ════════════════════════════════════════════════════════
//  TOUCH INPUT
// ════════════════════════════════════════════════════════
const stickZ=document.getElementById('stickZ');
const stickK=document.getElementById('stickKnob');
const lookZ=document.getElementById('lookZ');
const fireZ2=document.getElementById('fireZ');
const STICK_R=48;

function stickPos(tx,ty){
  const rect=stickZ.getBoundingClientRect();
  const cx=rect.left+rect.width/2,cy=rect.top+rect.height/2;
  let dx=tx-cx,dy=ty-cy;
  const d=Math.sqrt(dx*dx+dy*dy);
  if(d>STICK_R){dx=dx/d*STICK_R;dy=dy/d*STICK_R;}
  stickK.style.left=(50+dx/STICK_R*40)+'%'; stickK.style.top=(50+dy/STICK_R*40)+'%';
  stickDx=dx/STICK_R; stickDy=dy/STICK_R;
}

document.addEventListener('touchstart',e=>{
  for(const t of e.changedTouches){
    const el=document.elementFromPoint(t.clientX,t.clientY);
    if(!el) continue;
    if(stickZ.contains(el)||el===stickZ){stickTid=t.identifier;stickAct=true;stickPos(t.clientX,t.clientY);}
    else if(lookZ.contains(el)||el===lookZ){lookTid=t.identifier;lookLastX=t.clientX;}
    else if(fireZ2.contains(el)||el===fireZ2){startFire();}
  }
},{passive:true});

document.addEventListener('touchmove',e=>{
  for(const t of e.changedTouches){
    if(t.identifier===stickTid) stickPos(t.clientX,t.clientY);
    else if(t.identifier===lookTid){ me.angle+=(t.clientX-lookLastX)*.0055; lookLastX=t.clientX; }
  }
  e.preventDefault();
},{passive:false});

document.addEventListener('touchend',e=>{
  for(const t of e.changedTouches){
    if(t.identifier===stickTid){stickTid=-1;stickAct=false;stickDx=0;stickDy=0;stickK.style.left='50%';stickK.style.top='50%';}
    else if(t.identifier===lookTid){lookTid=-1;}
    else stopFire();
  }
},{passive:true});

let lastTap=0;
lookZ.addEventListener('touchend',()=>{const n=Date.now();if(n-lastTap<280)toggleScope();lastTap=n;},{passive:true});

document.addEventListener('keydown',e=>{
  K[e.key]=true;
  if(e.key===' '||e.key==='Enter') startFire();
  if(e.key==='r'||e.key==='R') reload();
  if(e.key==='f'||e.key==='F') toggleScope();
  if(e.key==='Tab'){e.preventDefault();showSB();}
  if(e.key==='q'||e.key==='Q') cycleGun(-1);
  if(e.key==='e'||e.key==='E') cycleGun(1);
  const n=parseInt(e.key);
  if(n>=1&&n<=me.inventory.length) switchGun(me.inventory[n-1]);
});
document.addEventListener('keyup',e=>{
  K[e.key]=false;
  if(e.key===' '||e.key==='Enter') stopFire();
  if(e.key==='Tab') hideSB();
});

function toast(msg,dur=2500){const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';clearTimeout(t._t);t._t=setTimeout(()=>t.style.display='none',dur);}
</script>
</body>
</html>
