<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Special Force Group 2</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:none;user-select:none;-webkit-user-select:none}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:-apple-system,sans-serif}
#gc{position:fixed;top:0;left:0;z-index:0}
.scr{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;background:#06060f;padding:12px;gap:8px;z-index:20;overflow-y:auto;-webkit-overflow-scrolling:touch}
.scr.off{display:none!important}
.gtitle{font-size:24px;font-weight:900;background:linear-gradient(135deg,#ff4400,#ffaa00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-.02em;flex-shrink:0}
.gsub{font-size:11px;color:#555;text-align:center;flex-shrink:0}
.card{background:#0f0f1a;border:1px solid #1a1a2e;border-radius:14px;padding:14px;width:100%;max-width:400px;display:flex;flex-direction:column;gap:9px;flex-shrink:0}
.lbl{font-size:10px;color:#444;text-transform:uppercase;letter-spacing:.06em}
.inp{background:#06060f;border:1.5px solid #1a1a2e;border-radius:9px;padding:11px 13px;color:#fff;font-size:14px;outline:none;width:100%;-webkit-appearance:none}
.inp:focus{border-color:#ff4400}
.btn{border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;width:100%}
.btn:active{opacity:.8}
.btn-red{background:linear-gradient(135deg,#cc2200,#991100);color:#fff}
.btn-blue{background:linear-gradient(135deg,#1144cc,#0033aa);color:#fff}
.btn-gray{background:#111;border:1px solid #222;color:#888}
.btn-green{background:linear-gradient(135deg,#116611,#0a440a);color:#fff}
.cc-row{display:flex;gap:7px;flex-wrap:wrap}
.cc{width:30px;height:30px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:.15s}
.cc.sel{border-color:#fff;transform:scale(1.15)}

/* MAP SELECT */
.map-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;width:100%;max-width:400px}
.map-card{background:#0f0f1a;border:2px solid #1a1a2e;border-radius:10px;padding:10px;cursor:pointer;transition:.15s;text-align:center}
.map-card.sel{border-color:#ff4400;background:#1a0a00}
.map-card:active{opacity:.7}
.map-ico{font-size:26px;display:block;margin-bottom:4px}
.map-name{font-size:12px;font-weight:700;color:#ccc}
.map-size{font-size:10px;color:#555}

/* LOBBY */
.plist{display:flex;flex-direction:column;gap:6px;width:100%;max-width:400px;max-height:160px;overflow-y:auto}
.prow{background:#0f0f1a;border:1px solid #1a1a2e;border-radius:9px;padding:9px 12px;display:flex;align-items:center;gap:8px;font-size:13px}
.pdot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* HUD */
#hud{position:fixed;inset:0;z-index:5;pointer-events:none}
.hp-bar{position:absolute;bottom:95px;left:50%;transform:translateX(-50%);width:160px;height:12px;background:rgba(0,0,0,.5);border-radius:6px;overflow:hidden;border:1px solid rgba(255,255,255,.08)}
.hp-fill{height:100%;background:linear-gradient(90deg,#cc2222,#ff4444);border-radius:6px;transition:.3s}
.hp-txt{position:absolute;bottom:111px;left:50%;transform:translateX(-50%);color:#fff;font-size:11px;font-weight:700;text-shadow:0 1px 3px #000;white-space:nowrap}
.kills-hud{position:absolute;top:8px;right:10px;color:#ffd700;font-size:14px;font-weight:900;text-shadow:0 1px 4px #000}
.ammo-hud{position:absolute;bottom:112px;right:12px;color:#fff;font-size:13px;font-weight:700;text-shadow:0 1px 3px #000}
.weapon-hud{position:absolute;bottom:128px;right:12px;color:#ffcc44;font-size:10px;font-weight:700;text-shadow:0 1px 3px #000}
.crosshair{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}
.crosshair::before,.crosshair::after{content:'';position:absolute;background:rgba(255,255,255,.9)}
.crosshair::before{width:2px;height:22px;left:9px;top:0;box-shadow:0 0 3px rgba(255,0,0,.6)}
.crosshair::after{width:22px;height:2px;top:9px;left:0;box-shadow:0 0 3px rgba(255,0,0,.6)}
.kill-feed{position:absolute;top:36px;right:10px;display:flex;flex-direction:column;gap:3px;align-items:flex-end}
.kf-item{background:rgba(0,0,0,.65);border-radius:5px;padding:3px 8px;font-size:11px;color:#fff;animation:kfIn .25s ease;max-width:200px;text-align:right}
@keyframes kfIn{from{opacity:0;transform:translateX(15px)}to{opacity:1;transform:none}}
.minimap{position:absolute;top:8px;left:8px;border-radius:7px;overflow:hidden;border:1px solid rgba(255,255,255,.12);opacity:.8}
.hit-flash{position:fixed;inset:0;background:rgba(255,0,0,.4);pointer-events:none;opacity:0;transition:opacity .08s;z-index:8}
.dmg-num{position:absolute;color:#ff3333;font-size:16px;font-weight:900;text-shadow:0 1px 4px #000;animation:dmgA .7s ease forwards;pointer-events:none}
@keyframes dmgA{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(-35px)}}
.name-tag{position:absolute;background:rgba(0,0,0,.65);border-radius:4px;padding:2px 5px;font-size:10px;font-weight:700;color:#fff;white-space:nowrap;pointer-events:none;transform:translate(-50%,-100%)}
.scope-overlay{position:fixed;inset:0;z-index:7;pointer-events:none;display:none}

/* WEAPON SELECT */
#weaponBar{position:absolute;bottom:2px;left:0;right:0;display:flex;justify-content:center;gap:4px;flex-wrap:nowrap;overflow-x:auto;padding:0 130px 0 90px;pointer-events:all}
#weaponBar::-webkit-scrollbar{display:none}
.wslot{background:rgba(0,0,0,.55);border:1.5px solid rgba(255,255,255,.12);border-radius:8px;padding:4px 7px;font-size:10px;color:#888;cursor:pointer;white-space:nowrap;flex-shrink:0;text-align:center;transition:.15s}
.wslot.active{border-color:#ff4400;color:#fff;background:rgba(255,68,0,.2)}
.wslot .wi{font-size:14px;display:block}

/* CONTROLS */
#controls{position:fixed;bottom:0;left:0;right:0;height:135px;z-index:6;display:none}
.stick-zone{position:absolute;bottom:8px;left:8px;width:118px;height:118px}
.stick-base{position:absolute;inset:0;border-radius:50%;background:rgba(255,255,255,.05);border:2px solid rgba(255,255,255,.12)}
.stick-knob{position:absolute;width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,.22);border:2px solid rgba(255,255,255,.3);transform:translate(-50%,-50%);left:50%;top:50%}
.look-zone{position:absolute;bottom:8px;right:136px;left:136px;height:118px}
.fire-btn{position:absolute;bottom:12px;right:12px;width:80px;height:80px;border-radius:50%;background:rgba(255,50,50,.3);border:3px solid rgba(255,80,80,.55);font-size:24px;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:7}
.fire-btn:active{background:rgba(255,50,50,.6)}
.reload-btn{position:absolute;bottom:80px;right:14px;width:42px;height:42px;border-radius:50%;background:rgba(100,100,255,.2);border:2px solid rgba(150,150,255,.35);font-size:14px;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:7}
.zoom-btn{position:absolute;bottom:80px;right:62px;width:38px;height:38px;border-radius:50%;background:rgba(255,200,50,.15);border:2px solid rgba(255,200,50,.3);font-size:13px;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:7}
.jump-btn{position:absolute;bottom:8px;left:132px;width:44px;height:44px;border-radius:50%;background:rgba(50,200,100,.15);border:2px solid rgba(50,200,100,.3);font-size:15px;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:7}

/* DEAD */
#sDead{background:#06060f}
#sDead .dtitle{font-size:36px;font-weight:900;color:#ff3333;text-shadow:0 0 20px #ff333355;margin-top:40px}
#sDead .dkiller{font-size:14px;color:#666;margin-top:4px}
#sDead .dcnt{font-size:48px;font-weight:900;color:#fff;margin:10px 0 6px}

.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.85);color:#fff;padding:11px 22px;border-radius:11px;font-size:14px;font-weight:700;z-index:30;display:none;text-align:center;max-width:85%}
.score-board{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:25;display:none;flex-direction:column;align-items:center;justify-content:center;padding:16px}
.sb-title{font-size:20px;font-weight:900;color:#ffd700;margin-bottom:12px}
.sb-row{display:flex;gap:10px;align-items:center;background:rgba(255,255,255,.05);border-radius:8px;padding:8px 14px;margin-bottom:6px;min-width:260px}
.sb-rank{font-size:18px;width:28px;text-align:center}
.sb-name{flex:1;font-size:13px;font-weight:700}
.sb-kills{color:#ffd700;font-size:13px;font-weight:900}
.sb-deaths{color:#ff4444;font-size:12px;margin-left:8px}
</style>
</head>

<!-- SETUP -->

      <div class="cc" style="background:#44ff88" data-c="#44ff88" onclick="selColor(this)"></div>

      <div class="cc" style="background:#00ddff" data-c="#00ddff" onclick="selColor(this)"></div>
      <div class="cc" style="background:#ff8800" data-c="#ff8800" onclick="selColor(this)"></div>
      <div class="cc" style="background:#aaffaa" data-c="#aaffaa" onclick="selColor(this)"></div>
    </div>
    <button class="btn btn-red" onclick="showHost()">📡 HOST — O'yinni boshlash</button>
    <button class="btn btn-blue" onclick="showJoin()">🔗 JOIN — Ulanish</button>
    <div id="joinRow" style="display:none;flex-direction:column;gap:8px">
      <div class="lbl">Host IP</div>
      <input class="inp" id="iIp" placeholder="192.168.43.1" value="192.168.43.1">
      <button class="btn btn-blue" onclick="joinGame()">▶ Ulaning</button>
    </div>
  </div>
</div>

<!-- MAP SELECT (Host only) -->
<div class="scr off" id="sMapSelect">
  <div class="gtitle">🗺 XARITA TANLANG</div>
  <div class="gsub">Special Force Group 2 — barcha xaritalar</div>
  <div class="map-grid" id="mapGrid"></div>
  <div style="max-width:400px;width:100%;display:flex;flex-direction:column;gap:7px;margin-top:6px">
    <button class="btn btn-green" onclick="confirmMap()">✅ Xaritani tasdiqlash</button>
    <button class="btn btn-gray" onclick="show('sSetup')">← Orqaga</button>
  </div>
</div>

<!-- LOBBY -->
<div class="scr off" id="sLobby">
  <div class="gtitle">🎮 LOBBY</div>
  <div class="gsub" id="lobbyInfo">Kutilmoqda...</div>
  <div class="plist" id="plist"></div>
  <div style="max-width:400px;width:100%;display:flex;flex-direction:column;gap:7px;margin-top:6px">
    <button class="btn btn-red off" id="btnStart" onclick="hostStart()">▶ BOSHLASH</button>
    <button class="btn btn-gray" onclick="leaveGame()">← Chiqish</button>
  </div>
</div>

<!-- DEAD -->
<div class="scr off" id="sDead">
  <div class="dtitle">💀 O'LDINGIZ!</div>
  <div class="dkiller" id="dKiller"></div>
  <div class="dcnt" id="dCnt">3</div>
  <div style="font-size:12px;color:#444">soniyadan so'ng...</div>
</div>

<!-- HUD -->
<div id="hud" class="off">
  <canvas id="mm" class="minimap" width="88" height="88"></canvas>
  <div class="kills-hud" id="hudKills">🎯 0</div>
  <div class="weapon-hud" id="hudWeapon">AK-47</div>
  <div class="ammo-hud" id="hudAmmo">🔫 30/90</div>
  <div class="hp-txt" id="hudHpTxt">❤️ 100</div>
  <div class="hp-bar"><div class="hp-fill" id="hudHp" style="width:100%"></div></div>
  <div class="crosshair" id="crosshair"></div>
  <div class="kill-feed" id="killFeed"></div>
  <div id="weaponBar"></div>
</div>

<div class="scope-overlay" id="scopeOverlay">
  <canvas id="scopeCanvas" style="position:absolute;inset:0;width:100%;height:100%"></canvas>
</div>

<!-- CONTROLS -->
<div id="controls">
  <div class="stick-zone" id="stickZone">
    <div class="stick-base"></div>
    <div class="stick-knob" id="stickKnob"></div>
  </div>
  <div class="look-zone" id="lookZone"></div>
  <div class="zoom-btn" id="zoomBtn" onclick="toggleScope()">🔭</div>
  <div class="reload-btn" id="reloadBtn" onclick="reload()">🔄</div>
  <div class="fire-btn" id="fireBtn">🔫</div>
</div>

<div class="hit-flash" id="hitFlash"></div>
<div class="toast" id="toast"></div>

<div class="score-board" id="scoreBoard">
  <div class="sb-title">📊 HISOBLAR</div>
  <div id="sbRows"></div>
  <button class="btn btn-gray" style="max-width:200px;margin-top:12px" onclick="hideScoreBoard()">Yopish</button>
</div>

// ═══════════════════════════════════════════════════
//  SPAWN POINTS parser
// ═══════════════════════════════════════════════════
function parseMap(mapKey) {
  const m = MAPS[mapKey];
  const data = m.data;
  const rows = data.length, cols = data[0].length;
  const grid = [];
  const spawns = [];
  const coins = [];
  for (let r = 0; r < rows; r++) {
    grid.push([]);
    for (let c = 0; c < cols; c++) {
      const ch = data[r][c] || '#';
      if (ch === '#') grid[r].push(1);
      else if (ch === 'p') { spawns.push({x:c+.5,y:r+.5}); grid[r].push(0); }
      else if (ch === 'C') { coins.push({x:c+.5,y:r+.5}); grid[r].push(0); }
      else grid[r].push(0);
    }
  }
  return { grid, spawns, coins, rows, cols, meta:m };
}

function connectWs(ip) {
  try { ws=new WebSocket(`ws://${ip}:8765`); }
  catch(e) { showToast('❌ Ulanishda xato!'); return; }
  ws.onopen=()=>{ ws.send(JSON.stringify({t:'hello',name:me.name,color:me.color})); };
  ws.onmessage=e=>handleMsg(JSON.parse(e.data));
  ws.onerror=()=>showToast('❌ Server topilmadi!');
  ws.onclose=()=>{ if(gameActive) showToast('📡 Ulanish uzildi'); };
}
function send(obj) { if(ws&&ws.readyState===1) ws.send(JSON.stringify(obj)); }

function handleMsg(msg) {
  const t=msg.t;
  if(t==='welcome'){
    me.id=msg.id; players={};
    (msg.players||[]).forEach(p=>{ if(p.id!==me.id) players[p.id]={...p,kills:0,deaths:0}; });
    if(isHost){ buildMapGrid(); show('sMapSelect'); }
    else { updateLobbyUI(); show('sLobby'); document.getElementById('lobbyInfo').textContent='⏳ Host boshlaguncha kuting...'; }
  }
  else if(t==='join'){
    players[msg.id]={id:msg.id,name:msg.name,color:msg.color,x:2.5,y:2.5,angle:0,hp:100,dead:false,kills:0,deaths:0,weapon:'AK-47'};
    updateLobbyUI(); addKF(`🟢 ${msg.name} qo'shildi`);
  }
  else if(t==='leave'){ delete players[msg.id]; updateLobbyUI(); }
  else if(t==='map_select'){ selectedMap=msg.map; }
  else if(t==='start'){ startGame(msg); }
  else if(t==='pos'){
    if(players[msg.id]){ Object.assign(players[msg.id],{x:msg.x,y:msg.y,angle:msg.a,dead:msg.dead,weapon:msg.weapon||'AK-47'}); }
  }
  else if(t==='shoot'){
    if(msg.id!==me.id){
      shots.push({x:msg.x,y:msg.y,dx:Math.cos(msg.a)*.35,dy:Math.sin(msg.a)*.35,life:14,color:players[msg.id]?.color||'#fff'});
      if(!me.dead){ const h=rayHitsPlayer(msg.x,msg.y,msg.a,me.x,me.y); if(h) send({t:'hit',victim:me.id,shooter:msg.id,damage:msg.dmg||25}); }
    }
  }
  else if(t==='hit'){
    if(msg.victim===me.id){
      me.hp=Math.max(0,me.hp-msg.damage);
      updateHpHud(); showHitFlash(); showDmgNum(-msg.damage);
      if(me.hp<=0&&!me.dead){ me.dead=true; me.deaths++; send({t:'dead',id:me.id,killer:msg.shooter}); showDeadScreen(players[msg.shooter]?.name||'???'); }
    } else if(players[msg.victim]){
      players[msg.victim].hp=Math.max(0,players[msg.victim].hp-msg.damage);
      spawnBlood(players[msg.victim].x,players[msg.victim].y);
    }
  }
  else if(t==='dead'){
    if(players[msg.id]) players[msg.id].dead=true;
    if(players[msg.killer]) players[msg.killer].kills=(players[msg.killer].kills||0)+1;
    if(msg.killer===me.id){ me.kills++; document.getElementById('hudKills').textContent='🎯 '+me.kills; }
    addKF(`💀 ${players[msg.killer]?.name||'?'} → ${players[msg.id]?.name||'?'}`);
  }
  else if(t==='respawn'){
    if(msg.id===me.id){ me.x=msg.x;me.y=msg.y;me.hp=100;me.dead=false; me.ammo=WEAPONS[me.weapon].ammo; me.reserve=WEAPONS[me.weapon].reserve; updateHpHud();updateAmmoHud(); show('sGame'); gameActive=true; }
    else if(players[msg.id]){ Object.assign(players[msg.id],{x:msg.x,y:msg.y,hp:100,dead:false}); }
  }
}

function switchWeapon(wname) {
  if(me.reloading||!me.inventory.includes(wname)) return;
  stopAutoFire();
  me.weapon=wname;
  const w=WEAPONS[wname];
  if(me.ammo===undefined) me.ammo=w.ammo;
  // Each weapon has its own ammo state
  if(!me.weaponAmmo) me.weaponAmmo={};
  if(me.weaponAmmo[wname]===undefined) me.weaponAmmo[wname]={ammo:w.ammo,reserve:w.reserve};
  me.ammo=me.weaponAmmo[wname].ammo;
  me.reserve=me.weaponAmmo[wname].reserve;
  if(me.scoped&&!w.scope){ me.scoped=false; document.getElementById('scopeOverlay').style.display='none'; document.getElementById('crosshair').style.display='block'; }
  updateAmmoHud();
  buildWeaponBar();
  document.getElementById('hudWeapon').textContent=wname;
  document.getElementById('zoomBtn').style.display=w.scope?'flex':'none';
  // Quickswitch via number keys
}

function cycleWeapon(dir) {
  const idx=me.inventory.indexOf(me.weapon);
  const next=(idx+dir+me.inventory.length)%me.inventory.length;
  switchWeapon(me.inventory[next]);
}

function addToInventory(wname) {
  if(!me.inventory.includes(wname)) me.inventory.push(wname);
  buildWeaponBar();
}

function reload() {
  if(!gameActive||me.dead||me.reloading) return;
  const w=WEAPONS[me.weapon];
  if(w.type==='knife') return;
  if(me.ammo===w.ammo||me.reserve<=0) return;
  me.reloading=true; updateAmmoHud();
  stopAutoFire();
  setTimeout(()=>{
    const need=w.ammo-me.ammo, take=Math.min(need,me.reserve);
    me.ammo+=take; me.reserve-=take;
    if(!me.weaponAmmo) me.weaponAmmo={};
    me.weaponAmmo[me.weapon]={ammo:me.ammo,reserve:me.reserve};
    me.reloading=false; updateAmmoHud();
    showToast('🔄 Yuklandi!',700);
  }, w.reload);
}

function toggleScope() {
  const w=WEAPONS[me.weapon];
  if(!w.scope) return;
  me.scoped=!me.scoped;
  document.getElementById('scopeOverlay').style.display=me.scoped?'block':'none';
  document.getElementById('crosshair').style.display=me.scoped?'none':'block';
  if(me.scoped) drawScope();
}

function drawScope() {
  const cv=document.getElementById('scopeCanvas');
  cv.width=SW; cv.height=SH;
  const sc=cv.getContext('2d');
  const cx=SW/2, cy=SH/2, r=Math.min(SW,SH)*.38;
  // Dark vignette
  sc.fillStyle='rgba(0,0,0,0.95)';
  sc.fillRect(0,0,SW,SH);
  // Clear circle
  sc.globalCompositeOperation='destination-out';
  sc.beginPath(); sc.arc(cx,cy,r,0,Math.PI*2); sc.fill();
  sc.globalCompositeOperation='source-over';
  // Crosshair
  sc.strokeStyle='rgba(255,255,255,0.9)'; sc.lineWidth=1.5;
  sc.beginPath(); sc.moveTo(cx-r,cy); sc.lineTo(cx+r,cy); sc.stroke();
  sc.beginPath(); sc.moveTo(cx,cy-r); sc.lineTo(cx,cy+r); sc.stroke();
  // Range marks
  for(let i=1;i<=4;i++){
    const gap=r/5*i;
    sc.beginPath(); sc.moveTo(cx-8,cy+gap); sc.lineTo(cx+8,cy+gap); sc.stroke();
  }
  // Border
  sc.strokeStyle='rgba(255,255,255,0.3)'; sc.lineWidth=3;
  sc.beginPath(); sc.arc(cx,cy,r,0,Math.PI*2); sc.stroke();
}

// ═══════════════════════════════════════════════════
//  SHOOTING
// ═══════════════════════════════════════════════════
function startAutoFire() {
  if(isAutoFiring) return;
  const w=WEAPONS[me.weapon];
  if(w.auto){ isAutoFiring=true; shoot(); autoFireInterval=setInterval(shoot, w.rate); }
  else shoot();
}
function stopAutoFire() {
  isAutoFiring=false;
  if(autoFireInterval){ clearInterval(autoFireInterval); autoFireInterval=null; }
}

function shoot() {
  if(!gameActive||me.dead||me.reloading) return;
  const w=WEAPONS[me.weapon];
  const now2=Date.now();
  if(now2-me.lastShot<w.rate) return;
  me.lastShot=now2;
  if(me.ammo<=0){ reload(); return; }

  me.ammo--;
  if(!me.weaponAmmo) me.weaponAmmo={};
  me.weaponAmmo[me.weapon]={ammo:me.ammo,reserve:me.reserve};
  updateAmmoHud();
  muzzleFlash=8; muzzleTimer=Date.now();

  if(w.type==='knife'){
    // Knife melee
    Object.values(players).forEach(p=>{
      if(!p||p.dead) return;
      const d=Math.hypot(p.x-me.x,p.y-me.y);
      if(d<w.rng) send({t:'hit',victim:p.id,shooter:me.id,damage:w.dmg});
    });
    return;
  }

  const pellets=w.pellets||1;
  for(let k=0;k<pellets;k++){
    const spread=(me.scoped?w.spread*.1:w.spread)*(1+Math.random());
    const a=me.angle+(Math.random()-0.5)*spread;
    shots.push({x:me.x+Math.cos(a)*.5,y:me.y+Math.sin(a)*.5,dx:Math.cos(a)*.4,dy:Math.sin(a)*.4,life:14,color:'#ffff88'});
    send({t:'shoot',id:me.id,x:me.x,y:me.y,a,dmg:Math.floor(w.dmg/pellets)});

    let hit=null,minDist=w.rng;
    Object.values(players).forEach(p=>{
      if(!p||p.dead) return;
      const h=rayHitsPlayer(me.x,me.y,a,p.x,p.y,w.rng);
      if(h){ const d=Math.hypot(p.x-me.x,p.y-me.y); if(d<minDist){minDist=d;hit=p;} }
    });
    if(hit){
      const dmg=Math.floor(w.dmg/pellets);
      send({t:'hit',victim:hit.id,shooter:me.id,damage:dmg});
      spawnBlood(hit.x,hit.y);
    }
  }

  if(me.ammo===0) setTimeout(reload,300);
}

function rayHitsPlayer(ox,oy,angle,px,py,maxR=20) {
  const dx=px-ox,dy=py-oy,dist=Math.sqrt(dx*dx+dy*dy);
  if(dist>maxR||dist<0.3) return false;
  const toT=Math.atan2(dy,dx);
  let diff=toT-angle;
  while(diff>Math.PI)diff-=Math.PI*2;
  while(diff<-Math.PI)diff+=Math.PI*2;
  if(Math.abs(diff)>0.18) return false;
  const steps=Math.floor(dist*3);
  for(let i=1;i<steps;i++){
    const t=i/steps;
    if(isWall(ox+dx*t,oy+dy*t)) return false;
  }
  return true;
}

function spawnBlood(x,y) {
  for(let i=0;i<6;i++) bloodParts.push({x:x+(Math.random()-.5)*.4,y:y+(Math.random()-.5)*.4,oy:Math.random()*.5,life:14+Math.random()*6});
}

// ═══════════════════════════════════════════════════
//  MOVEMENT
// ═══════════════════════════════════════════════════
function isWall(cx,cy) {
  if(!mapData) return false;
  const mx=Math.floor(cx),my=Math.floor(cy);
  if(mx<0||mx>=mapData.cols||my<0||my>=mapData.rows) return true;
  return mapData.grid[my][mx]>0;
}

function tryMove(dx,dy) {
  const r=0.32;
  const nx=me.x+dx,ny=me.y+dy;
  if(!isWall(nx+Math.sign(dx)*r,me.y+r)&&!isWall(nx+Math.sign(dx)*r,me.y-r)) me.x=nx;
  if(!isWall(me.x+r,ny+Math.sign(dy)*r)&&!isWall(me.x-r,ny+Math.sign(dy)*r)) me.y=ny;
}

// ═══════════════════════════════════════════════════
//  RAYCASTING
// ═══════════════════════════════════════════════════
function castRays() {
  if(!mapData) return;
  const meta=mapData.meta;
  const fovScale=me.scoped?0.3:1;
  const fov=Math.PI/3*fovScale;
  const hfov=fov/2;

  // Sky
  const sky=ctx.createLinearGradient(0,0,0,RH/2);
  const c1=meta.ceil||'#87ceeb';
  sky.addColorStop(0,'#050510'); sky.addColorStop(1,c1);
  ctx.fillStyle=sky; ctx.fillRect(0,0,RW,RH/2);
  // Floor
  const flr=ctx.createLinearGradient(0,RH/2,0,RH);
  flr.addColorStop(0,meta.floor||'#888'); flr.addColorStop(1,'#111');
  ctx.fillStyle=flr; ctx.fillRect(0,RH/2,RW,RH/2);

  const cosA=Math.cos(me.angle),sinA=Math.sin(me.angle);
  const plX=sinA*Math.tan(hfov), plY=-cosA*Math.tan(hfov);
  const fogD=meta.fog||12;

  for(let x=0;x<RW;x++){
    const cx=2*x/RW-1;
    const rdx=cosA+plX*cx, rdy=sinA+plY*cx;
    let mx=Math.floor(me.x),my=Math.floor(me.y);
    const ddx=Math.abs(1/rdx),ddy=Math.abs(1/rdy);
    let stepX,stepY,sdx,sdy;
    if(rdx<0){stepX=-1;sdx=(me.x-mx)*ddx;}else{stepX=1;sdx=(mx+1-me.x)*ddx;}
    if(rdy<0){stepY=-1;sdy=(me.y-my)*ddy;}else{stepY=1;sdy=(my+1-me.y)*ddy;}
    let side=0,hit=false,depth=0;
    while(!hit&&depth<30){
      if(sdx<sdy){sdx+=ddx;mx+=stepX;side=0;}else{sdy+=ddy;my+=stepY;side=1;}
      depth++;
      if(mx<0||mx>=mapData.cols||my<0||my>=mapData.rows||mapData.grid[my][mx]>0) hit=true;
    }
    const pd=side===0?(mx-me.x+(1-stepX)/2)/rdx:(my-me.y+(1-stepY)/2)/rdy;
    zbuf[x]=pd;
    const lh=Math.floor(RH/Math.max(0.1,pd));
    const y0=Math.max(0,Math.floor(RH/2-lh/2));
    const y1=Math.min(RH-1,Math.floor(RH/2+lh/2));
    const wt=meta.wallColors||['#888','#666','#444'];
    const hex=side===0?wt[0]:wt[1];
    const fog=Math.min(1,pd/fogD);
    ctx.fillStyle=blendFog(hex,fog);
    ctx.fillRect(x,y0,1,y1-y0);
  }
}

function blendFog(hex,t){
  const r=parseInt(hex.slice(1,3),16);
  const g=parseInt(hex.slice(3,5),16);
  const b=parseInt(hex.slice(5,7),16);
  return `rgb(${Math.floor(r*(1-t)+8*t)},${Math.floor(g*(1-t)+8*t)},${Math.floor(b*(1-t)+8*t)})`;
}

// ═══════════════════════════════════════════════════
//  SPRITE RENDERING
// ═══════════════════════════════════════════════════
function renderSprites() {
  const fovScale=me.scoped?0.3:1;
  const fov=Math.PI/3*fovScale;
  const hfov=fov/2;
  const cosA=Math.cos(me.angle),sinA=Math.sin(me.angle);
  const plX=sinA*Math.tan(hfov),plY=-cosA*Math.tan(hfov);
  const invDet=1/(plX*sinA-cosA*plY);

  const all=[];
  Object.values(players).forEach(p=>{ if(!p||p.dead) return; const dx=p.x-me.x,dy=p.y-me.y; all.push({type:'player',p,dx,dy,dist:Math.sqrt(dx*dx+dy*dy)}); });
  shots.forEach(s=>{ const dx=s.x-me.x,dy=s.y-me.y; all.push({type:'shot',s,dx,dy,dist:Math.sqrt(dx*dx+dy*dy)}); });
  bloodParts.forEach(b=>{ const dx=b.x-me.x,dy=b.y-me.y; all.push({type:'blood',b,dx,dy,dist:Math.sqrt(dx*dx+dy*dy)}); });
  all.sort((a,b)=>b.dist-a.dist);

  all.forEach(sp=>{
    const {dx,dy}=sp;
    const tX=cosA*dy-sinA*dx, tY=sinA*dy+cosA*dx;
    if(tY<=0.1) return;
    const scrX=Math.floor(RW/2*(1+tX/tY));

    if(sp.type==='player'){
      const p=sp.p;
      const h=Math.abs(Math.floor(RH/tY));
      const w=Math.floor(h*.55);
      const x0=Math.floor(scrX-w/2);
      const y0=Math.floor(RH/2-h/2);
      const bh=Math.floor(h*.75), hy=y0+Math.floor(h*.12);
      const hh=Math.floor(h*.2), hx0=Math.floor(x0+w*.18), hw=Math.floor(w*.64);

      for(let sx=Math.max(0,x0);sx<Math.min(RW,x0+w);sx++){
        if(zbuf[sx]>tY){
          ctx.fillStyle=p.color;
          ctx.fillRect(sx,hy,1,bh);
          if(sx>=hx0&&sx<hx0+hw){ ctx.fillStyle='#ffcc99'; ctx.fillRect(sx,y0,1,hh); }
        }
      }
      // Name tag
      if(tY<10){
        let nt=document.getElementById('nt_'+p.id);
        if(!nt){ nt=document.createElement('div'); nt.className='name-tag'; nt.id='nt_'+p.id; document.getElementById('hud').appendChild(nt); }
        nt.style.left=(scrX/RW*SW)+'px'; nt.style.top=(y0/RH*SH)+'px';
        nt.style.color=p.color; nt.textContent=`${p.name} ❤${p.hp}`;
        nt.style.display='block';
      } else { const nt=document.getElementById('nt_'+p.id); if(nt)nt.style.display='none'; }

    } else if(sp.type==='shot'){
      const sz=Math.max(2,Math.floor(10/tY));
      const sx=Math.max(0,Math.min(RW-1,scrX));
      ctx.fillStyle=sp.s.color; ctx.globalAlpha=sp.s.life/14;
      ctx.fillRect(sx-sz/2,RH/2-sz/2,sz,sz); ctx.globalAlpha=1;
    } else if(sp.type==='blood'){
      const sz=Math.max(1,Math.floor(5/tY));
      const sx=Math.max(0,Math.min(RW-1,scrX));
      ctx.fillStyle='#cc0000'; ctx.globalAlpha=sp.b.life/20;
      ctx.fillRect(sx,RH/2+Math.floor(RH/2/tY*.3),sz,sz); ctx.globalAlpha=1;
    }
  });
}

// ═══════════════════════════════════════════════════
//  WEAPON RENDER
// ═══════════════════════════════════════════════════
function renderWeapon() {
  if(me.scoped) return;
  const w=WEAPONS[me.weapon];
  const bob=Math.sin(Date.now()*.004)*(stickActive?2.5:.4);
  const bx=Math.cos(Date.now()*.002)*(stickActive?1.2:.2);
  const wc=w.color||'#888';

  if(w.type==='knife'){
    const kx=RW*.58+bx, ky=RH*.55+bob;
    ctx.save(); ctx.translate(kx,ky); ctx.rotate(-.4);
    ctx.fillStyle='#aaa'; ctx.fillRect(-2,-RH*.25,4,RH*.25);
    ctx.fillStyle='#666'; ctx.fillRect(-3,0,6,8);
    ctx.fillStyle='#8b4513'; ctx.fillRect(-4,8,8,16);
    ctx.restore(); return;
  }

  if(w.type==='sniper'){
    const sx=RW*.4+bx, sy=RH*.6+bob;
    ctx.fillStyle='#1a1a1a'; ctx.fillRect(sx,sy,RW*.45,RH*.22);
    ctx.fillStyle='#333'; ctx.fillRect(sx+4,sy-RH*.4,6,RH*.4);
    ctx.fillStyle='#555'; ctx.fillRect(sx+RW*.25,sy-RH*.05,RW*.1,RH*.08);
    if(muzzleFlash>0){ ctx.fillStyle='rgba(255,200,80,'+muzzleFlash/8+')'; ctx.fillRect(sx+2,sy-RH*.42,12,12); }
    return;
  }

  if(w.type==='shotgun'){
    const sx=RW*.45+bx, sy=RH*.6+bob;
    ctx.fillStyle='#3a2010'; ctx.fillRect(sx,sy,RW*.4,RH*.26);
    ctx.fillStyle='#222'; ctx.fillRect(sx+4,sy-RH*.38,8,RH*.38);
    ctx.fillStyle='#111'; ctx.fillRect(sx+4,sy-RH*.42,6,6);
    if(muzzleFlash>0){ ctx.fillStyle='rgba(255,150,50,'+muzzleFlash/8+')'; ctx.beginPath(); ctx.arc(sx+7,sy-RH*.42,14,0,Math.PI*2); ctx.fill(); }
    return;
  }

  if(w.type==='mg'){
    const mx=RW*.38+bx, my=RH*.58+bob;
    ctx.fillStyle='#2a2a2a'; ctx.fillRect(mx,my,RW*.5,RH*.28);
    ctx.fillStyle='#333'; ctx.fillRect(mx+4,my-RH*.45,6,RH*.45);
    ctx.fillStyle='#1a1a1a'; ctx.fillRect(mx,my+RH*.12,RW*.48,RH*.08);
    if(muzzleFlash>0){ ctx.fillStyle='rgba(255,220,80,'+muzzleFlash/8+')'; ctx.beginPath(); ctx.arc(mx+7,my-RH*.45,16,0,Math.PI*2); ctx.fill(); }
    return;
  }

  if(w.type==='pistol'){
    const px=RW*.6+bx, py=RH*.62+bob;
    ctx.fillStyle='#222'; ctx.fillRect(px,py,RW*.22,RH*.22);
    ctx.fillStyle='#333'; ctx.fillRect(px+4,py-RH*.28,4,RH*.28);
    ctx.fillStyle='#1a1a1a'; ctx.fillRect(px,py+RH*.12,RW*.2,RH*.06);
    if(muzzleFlash>0){ ctx.fillStyle='rgba(255,200,80,'+muzzleFlash/8+')'; ctx.beginPath(); ctx.arc(px+6,py-RH*.28,8,0,Math.PI*2); ctx.fill(); }
    return;
  }

  // Default rifle/smg
  const wx=RW*.52+bx, wy=RH*.62+bob;
  ctx.fillStyle='#1a1a1a'; ctx.fillRect(wx,wy,RW*.38,RH*.22);
  ctx.fillStyle=wc; ctx.fillRect(wx,wy+RH*.12,RW*.36,RH*.07);
  ctx.fillStyle='#111'; ctx.fillRect(wx+4,wy-RH*.48,5,RH*.48);
  ctx.fillStyle='#222'; ctx.fillRect(wx+RW*.08,wy,RW*.1,RH*.14);
  if(muzzleFlash>0){
    ctx.fillStyle=`rgba(255,220,80,${muzzleFlash/8})`;
    ctx.beginPath(); ctx.arc(wx+6,wy-RH*.5,12,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,255,200,.6)'; ctx.fillRect(wx+2,wy-RH*.55,4,6);
    muzzleFlash--;
  }
  if(me.reloading){ ctx.fillStyle='rgba(255,200,0,.7)'; ctx.font=`bold ${Math.floor(RH*.07)}px monospace`; ctx.textAlign='center'; ctx.fillText('RELOAD...',RW*.5,RH*.85); }
}

// ═══════════════════════════════════════════════════
//  MINIMAP
// ═══════════════════════════════════════════════════
function renderMinimap() {
  if(!mapData) return;
  const cs=3, view=14;
  mmc.fillStyle='rgba(0,0,0,.75)'; mmc.fillRect(0,0,88,88);
  const ox=Math.max(0,Math.min(mapData.cols-view,Math.floor(me.x)-view/2));
  const oy=Math.max(0,Math.min(mapData.rows-view,Math.floor(me.y)-view/2));
  for(let r=0;r<view&&oy+r<mapData.rows;r++){
    for(let c=0;c<view&&ox+c<mapData.cols;c++){
      if(mapData.grid[oy+r][ox+c]){ mmc.fillStyle=mapData.meta.wallColors?.[0]||'#445'; mmc.fillRect(c*cs,r*cs,cs-1,cs-1); }
    }
  }
  Object.values(players).forEach(p=>{ if(p.dead)return; const px=(p.x-ox)*cs,py=(p.y-oy)*cs; mmc.fillStyle=p.color; mmc.fillRect(px-2,py-2,4,4); });
  const mx=(me.x-ox)*cs,my2=(me.y-oy)*cs;
  mmc.fillStyle='#fff'; mmc.fillRect(mx-2,my2-2,5,5);
  mmc.strokeStyle='#fff'; mmc.lineWidth=1.5;
  mmc.beginPath(); mmc.moveTo(mx,my2); mmc.lineTo(mx+Math.cos(me.angle)*8,my2+Math.sin(me.angle)*8); mmc.stroke();
}

// ═══════════════════════════════════════════════════
//  GAME LOOP
// ═══════════════════════════════════════════════════
let lastF=0;
function loop(ts){
  frame++;
  const dt=Math.min(ts-lastF,50); lastF=ts;
  requestAnimationFrame(loop);
  if(!gameActive||!mapData) return;

  const spd=WEAPONS[me.weapon]?.type==='mg'?.055:.08;
  let mx=0,my=0;
  if((keys['w']||keys['ArrowUp']||stickDy<-.2)){mx+=Math.cos(me.angle)*spd;my+=Math.sin(me.angle)*spd;}
  if((keys['s']||keys['ArrowDown']||stickDy>.2)){mx-=Math.cos(me.angle)*spd;my-=Math.sin(me.angle)*spd;}
  if((keys['a']||stickDx<-.2)){mx+=Math.cos(me.angle-Math.PI/2)*spd;my+=Math.sin(me.angle-Math.PI/2)*spd;}
  if((keys['d']||stickDx>.2)){mx+=Math.cos(me.angle+Math.PI/2)*spd;my+=Math.sin(me.angle+Math.PI/2)*spd;}
  if(!me.dead&&(mx||my)) tryMove(mx,my);
  if(keys['ArrowLeft']) me.angle-=.03;
  if(keys['ArrowRight']) me.angle+=.03;

  const now2=Date.now();
  if(now2-lastPosUpdate>45){ send({t:'pos',x:me.x,y:me.y,a:me.angle,dead:me.dead,weapon:me.weapon}); lastPosUpdate=now2; }

  shots.forEach(s=>{s.x+=s.dx;s.y+=s.dy;s.life--;});
  shots=shots.filter(s=>s.life>0&&!isWall(s.x,s.y));
  bloodParts.forEach(b=>b.life--);
  bloodParts=bloodParts.filter(b=>b.life>0);

  ctx.clearRect(0,0,RW,RH);
  if(!me.dead){ castRays(); renderSprites(); renderWeapon(); }
  renderMinimap();

  if(me.scoped) drawScope();
}
requestAnimationFrame(loop);

  },1000);
}

// ═══════════════════════════════════════════════════
//  TOUCH CONTROLS
// ═══════════════════════════════════════════════════
const stickZone=document.getElementById('stickZone');
const stickKnob=document.getElementById('stickKnob');
const lookZone=document.getElementById('lookZone');
const fireBtn=document.getElementById('fireBtn');
const STICK_R=50;

function stickPos(tx,ty){
  const rect=stickZone.getBoundingClientRect();
  const cx=rect.left+rect.width/2,cy=rect.top+rect.height/2;
  let dx=tx-cx,dy=ty-cy;
  const d=Math.sqrt(dx*dx+dy*dy);
  if(d>STICK_R){dx=dx/d*STICK_R;dy=dy/d*STICK_R;}
  stickKnob.style.left=(50+dx/STICK_R*42)+'%'; stickKnob.style.top=(50+dy/STICK_R*42)+'%';
  stickDx=dx/STICK_R; stickDy=dy/STICK_R;
}

document.addEventListener('touchstart',e=>{
  for(const t of e.changedTouches){
    const el=document.elementFromPoint(t.clientX,t.clientY);
    if(!el) continue;
    if(stickZone.contains(el)||el===stickZone){stickTouchId=t.identifier;stickActive=true;stickPos(t.clientX,t.clientY);}
    else if(lookZone.contains(el)||el===lookZone){lookTouchId=t.identifier;lookActive=true;lookLastX=t.clientX;}
    else if(el===fireBtn||fireBtn.contains(el)){startAutoFire();}
  }
},{passive:true});

document.addEventListener('touchmove',e=>{
  for(const t of e.changedTouches){
    if(t.identifier===stickTouchId) stickPos(t.clientX,t.clientY);
    else if(t.identifier===lookTouchId){ me.angle+=(t.clientX-lookLastX)*.006; lookLastX=t.clientX; }
  }
  e.preventDefault();
},{passive:false});

document.addEventListener('touchend',e=>{
  for(const t of e.changedTouches){
    if(t.identifier===stickTouchId){stickTouchId=-1;stickActive=false;stickDx=0;stickDy=0;stickKnob.style.left='50%';stickKnob.style.top='50%';}
    else if(t.identifier===lookTouchId){lookTouchId=-1;lookActive=false;}
    else{ stopAutoFire(); }
  }
},{passive:true});

// Keyboard
document.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if(e.key===' '||e.key==='Enter') startAutoFire();
  if(e.key==='r'||e.key==='R') reload();
  if(e.key==='f'||e.key==='F') toggleScope();
  if(e.key==='Tab'){e.preventDefault(); showScoreBoard();}
  if(e.key==='q'||e.key==='Q') cycleWeapon(-1);
  if(e.key==='e'||e.key==='E') cycleWeapon(1);
  // Number keys for weapon switch
  const n=parseInt(e.key);
  if(n>=1&&n<=me.inventory.length) switchWeapon(me.inventory[n-1]);
});
document.addEventListener('keyup',e=>{
  keys[e.key]=false;
  if(e.key===' '||e.key==='Enter') stopAutoFire();
  if(e.key==='Tab') hideScoreBoard();
});

// Double tap zoom
let lastTap=0;
document.getElementById('lookZone').addEventListener('touchend',e=>{
  const now2=Date.now();
  if(now2-lastTap<300){ toggleScope(); }
  lastTap=now2;
},{passive:true});

// Toast
function showToast(msg,dur=2500){
  const t=document.getElementById('toast');
  t.textContent=msg; t.style.display='block';
  clearTimeout(t._t); t._t=setTimeout(()=>t.style.display='none',dur);
}
